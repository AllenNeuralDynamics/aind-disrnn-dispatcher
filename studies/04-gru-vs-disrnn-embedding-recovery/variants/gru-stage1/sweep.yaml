# embedding-recovery / gru-stage1 — Stage-1 (static subjects) GRU recovery grid.
#
# Maps subject-embedding recovery vs (#subjects, GRU capacity, embedding size) on
# mice-comparable synthetic data with KNOWN ground truth. 4×3×3 = 36 grid points.
#
# W&B group is set by `name:` -> gru-stage1 (launcher appends @<launch_id>).
# Data regenerates deterministically per run; same num_subjects+seed => identical
# data across the hidden/embed cells, so recovery is comparable within a #subjects
# column.

entity: AIND-disRNN
project: embedding_recovery
name: gru-stage1

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - model=gru
  # --- mice-comparable static Stage-1 data (num_subjects swept below) ---
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.batch_size=512
  - data.eval_every_n=2
  - data/task=random_walk
  - data.task.reward_baiting=false
  # --- multisubject GRU; hidden_size + subject_embedding_size swept below ---
  - model.architecture.multisubject=true
  - model.architecture.session_encoding_type=none   # Stage 1: no session conditioning
  - model.training.n_steps=50000
  - model.training.lr=0.001
  - model.training.checkpoint_every_n_steps=5000
  - model.training.auto_heldout_finetune.enabled=false
  - "wandb.tags=[embedding-recovery,stage1,gru]"
  - ${args_no_hyphens}

parameters:
  data.num_subjects:
    values: [50, 100, 200, 300]
  model.architecture.hidden_size:
    values: [16, 64, 256]
  model.architecture.subject_embedding_size:
    values: [2, 4, 8]
  seed:
    values: [42]
