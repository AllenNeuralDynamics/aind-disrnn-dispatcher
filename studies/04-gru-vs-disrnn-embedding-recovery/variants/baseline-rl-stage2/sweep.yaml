# embedding-recovery / baseline-rl-stage2 — misspecified-along-time reference.
#
# Fits an independent static ForagerQLearning (scipy DE) per subject on the SAME
# DRIFTING Stage-2 data as gru-stage2 (agent=hierarchical_rl_stage2). Same fitter
# structure as Stage 1 (forget=0, choice_kernel=none) and, per Han, NO held-out
# split (fit all subjects). heldout_refit disabled.
#
# ROLE FLIPS vs Stage 1. In Stage 1 baseline_rl was the likelihood CEILING (~1.0)
# because it fit the true static model. In Stage 2 the generator drifts WITHIN
# subject but this fitter still estimates ONE static parameter set per subject --
# it has no session axis. So it is now MISSPECIFIED along the time axis and must
# explain a moving policy with a session-averaged compromise:
#   PREDICTION: likelihood_relative_to_groundtruth drops BELOW 1.0 here.
# The session-conditioned GRU (gru-stage2, session_encoding=scalar) should stay
# nearer ceiling. The GAP = the value of the session-conditioning mechanism, and
# this static baseline is the reference band the drift-aware model must exceed.

entity: AIND-disRNN
project: embedding_recovery
name: baseline-rl-stage2

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage2      # DRIFT ON (same data as gru-stage2)
  - model=baseline_rl
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.eval_every_n=2
  - data/task=random_walk
  - data.task.reward_baiting=false
  # structure-match the generator (static fitter; the drift is what it CANNOT track)
  - model.agent_kwargs.number_of_learning_rate=1
  - model.agent_kwargs.number_of_forget_rate=0
  - model.agent_kwargs.choice_kernel=none
  - model.agent_kwargs.action_selection=softmax
  - model.heldout_refit.enabled=false      # fit all subjects, no held-out (Han)
  - "wandb.tags=[embedding-recovery,stage2,baseline_rl,reference]"
  - ${args_no_hyphens}

parameters:
  data.num_subjects:
    values: [50, 100, 200, 300]
  seed:
    values: [42]
