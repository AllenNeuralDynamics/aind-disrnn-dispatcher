# embedding-recovery / gru-stage2 — Stage-2 (within-subject DRIFT) GRU recovery.
#
# Stage 1 settled the config: hidden_size=16, embedding_size=4 recovers the static
# subject centroid at the correct-model ceiling; larger GRU adds nothing (confirmed
# with Han 2026-07-05). Stage 2 fixes that config and turns ON across-session drift
# in the generator (agent=hierarchical_rl_stage2: learn_rate up, |biasL| toward 0,
# softmax temp sharper), then asks whether SESSION CONDITIONING lets the GRU track
# the within-subject trajectory.
#
# KEY CONTRAST swept below: session_encoding_type in {none, scalar}.
#   none   -> session-BLIND: one embedding per subject, no session axis. Like the
#             static baseline_rl, it must explain a moving policy with a
#             session-averaged compromise -> expected to fall BELOW ceiling.
#   scalar -> session conditioning ON: the model gets a per-session scalar and can
#             track the drift -> expected to stay near ceiling.
# The GAP (scalar - none) = the value added by the session-conditioning mechanism.
#
# baseline_rl (static per-subject fit) is run separately as the misspecified-along-
# time reference band the drift-aware model is meant to exceed.

entity: AIND-disRNN
project: embedding_recovery
name: gru-stage2

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage2      # DRIFT ON (Stage 2)
  - model=gru
  # --- mice-comparable drifting Stage-2 data (num_subjects swept below) ---
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.batch_size=512
  - data.eval_every_n=2
  - data/task=random_walk
  - data.task.reward_baiting=false
  # --- settled GRU config from Stage 1 ---
  - model.architecture.multisubject=true
  - model.architecture.hidden_size=16
  - model.architecture.subject_embedding_size=4
  # session conditioning knobs (used when session_encoding_type != none)
  - model.training.lambda_reg_session=1.0
  - model.training.n_steps=50000
  - model.training.lr=0.001
  - model.training.checkpoint_every_n_steps=5000
  - model.training.auto_heldout_finetune.enabled=false
  - "wandb.tags=[embedding-recovery,stage2,gru]"
  - ${args_no_hyphens}

parameters:
  data.num_subjects:
    values: [50, 100, 200, 300]
  model.architecture.session_encoding_type:
    values: [none, scalar]
  seed:
    values: [42]
