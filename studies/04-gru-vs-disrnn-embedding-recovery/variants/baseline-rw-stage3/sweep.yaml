# embedding-recovery / baseline-rw-stage3 — FIXED Rescorla-Wagner-style fitter on Stage-3
# mixture data.
#
# FOURTH fixed baseline for the Stage-3 mixture, added to close the RescorlaWagner gap
# (previously only Bari/Hattori/CTT existed, leaving RW subjects structurally mis-assigned
# to the closest available softmax-QL fitter). Fits a SINGLE model type (epsilon-greedy QL,
# matching the generator's RW preset exactly) to ALL 200 subjects (one fit per subject) on
# the SAME Stage-3 mixture data + SAME tail held-out split as gru-stage3 / the other three
# baselines. Per-subject held-out likelihood from all FOUR baselines is compared in
# analysis: model-selection over the four now assigns each subject's family with a
# correctly-specified fitter available for every true preset.
entity: AIND-disRNN
project: embedding_recovery
name: baseline-rw-stage3

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage3
  - model=baseline_rl_rw
  - model.multisubject_subject_workers=48
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - "wandb.tags=[embedding-recovery,stage3,baseline_rl,rescorlawagner,reference]"
  - ${args_no_hyphens}

parameters:
  seed:
    values: [42]
