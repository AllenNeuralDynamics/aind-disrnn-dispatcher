# embedding-recovery / gru-stage4b — PER-SESSION FAMILY SWITCHING. Each subject is a
# MIXTURE over the three families (QLearning / CompareToThreshold / LossCounting); each
# SESSION draws its family from the subject's mixture weights (Dirichlet, concentration
# 0.5 -> sparse). Held-out-tail eval.
#
# Stage 4b tests the SUBJECT-vs-SESSION dissociation directly: the SUBJECT embedding
# should recover the subject's stable mixture weights (its identity), while the SESSION
# embedding should decode the realized per-session family. This is why the session-
# conditioning axis {none, scalar} matters most here — a subject-only embedding cannot
# express which family a given session used.
entity: AIND-disRNN
project: embedding_recovery
name: gru-stage4b

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage4b
  - model=gru
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.batch_size=512
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - model.architecture.multisubject=true
  - model.architecture.hidden_size=32
  - model.training.lambda_reg_session=1.0
  - model.training.n_steps=50000
  - model.training.lr=0.001
  - model.training.checkpoint_every_n_steps=5000
  - model.training.auto_heldout_finetune.enabled=false
  - "wandb.tags=[embedding-recovery,stage4b,gru,mixture_family_switching]"
  - ${args_no_hyphens}

parameters:
  model.architecture.session_encoding_type:
    values: [none, scalar]
  model.architecture.subject_embedding_size:
    values: [4, 8, 16]
  seed:
    values: [42]
