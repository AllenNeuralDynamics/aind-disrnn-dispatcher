# embedding-recovery / gru-stage3 — MIXTURE OF Q-LEARNING VARIANTS (Bari/Hattori/RW),
# one preset per subject, held-out-tail eval.
#
# Stage 3 layers a per-subject MODEL-TYPE axis on top of per-subject params: each subject
# is one of {Bari, Hattori, Rescorla-Wagner} for life (agent=hierarchical_rl_stage3), each
# preset carrying Stage-2b-style drift (magnitude x2 + non-monotonic softmax + session_noise)
# on the params it has. Recovery axes: within-family param recovery + preset classification
# from the subject embedding; baselines = the 3 fixed fitters (Bari/Hattori/CTT).
#
# COMPUTE POLICY (Han 2026-07-05): fix num_subjects=200. The mixture generator has MORE
# free params/subject (Bari 5, Hattori 5, RW 3) and 3 discrete classes -> higher-diversity
# ground truth, so per Han's capacity caveat we REINTRODUCE the embedding-size sweep
# {4,8,16} (x session_encoding {none, scalar}) = 6 GRU cells, hidden bumped to 32.

entity: AIND-disRNN
project: embedding_recovery
name: gru-stage3

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage3          # MIXTURE of Bari/Hattori/RW, one preset/subject
  - model=gru
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.batch_size=512
  - data.eval_every_n=2
  - data.heldout_session_mode=tail             # extrapolation split (fair model comparison)
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - model.architecture.multisubject=true
  - model.architecture.hidden_size=32          # bumped for higher-diversity mixture generator
  - model.training.lambda_reg_session=1.0
  - model.training.n_steps=50000
  - model.training.lr=0.001
  - model.training.checkpoint_every_n_steps=5000
  - model.training.auto_heldout_finetune.enabled=false
  - "wandb.tags=[embedding-recovery,stage3,gru,mixture]"
  - ${args_no_hyphens}

parameters:
  model.architecture.session_encoding_type:
    values: [none, scalar]
  model.architecture.subject_embedding_size:
    values: [4, 8, 16]
  seed:
    values: [42]
