# embedding-recovery / baseline-ctt-stage3 — FIXED ctt fitter on Stage-3 mixture data.
#
# One of the THREE FIXED baselines (Bari/Hattori/CTT). Fits a SINGLE model type (ctt) to
# ALL 200 subjects (one fit per subject) on the SAME Stage-3 mixture data + SAME tail
# held-out split as gru-stage3. Per-subject held-out likelihood from the three baselines
# is compared in analysis: (1) model-selection over the three assigns each subject's family
# (recovers the generator's preset) and (2) each provides a correct/mis-specified likelihood
# reference the GRU is scored against.
entity: AIND-disRNN
project: embedding_recovery
name: baseline-ctt-stage3

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage3
  - model=baseline_rl_ctt
  - model.multisubject_subject_workers=48
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - "wandb.tags=[embedding-recovery,stage3,baseline_rl,ctt,reference]"
  - ${args_no_hyphens}

parameters:
  seed:
    values: [42]
