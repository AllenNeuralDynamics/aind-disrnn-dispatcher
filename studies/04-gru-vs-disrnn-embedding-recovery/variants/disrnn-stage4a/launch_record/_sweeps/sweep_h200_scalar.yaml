# embedding-recovery / disrnn-stage4a — disRNN replication of Stage-4a (MIXTURE OF MODEL
# FAMILIES: QLearning / CompareToThreshold / LossCounting, one family per subject, held-out
# tail eval). Same generator + same tail split + same recovery analysis as gru-stage4a, so
# the two are directly comparable: does the interpretable disRNN subject embedding recover
# model FAMILY as well as the GRU's (100% for GRU)?
#
# disRNN hyperparameters carried from the beta-scan study's settled optimum:
#   base beta_latent = 1e-3 (middle of the {3e-4,1e-3,3e-3} scan; strong enough to sparsify,
#     not so strong it floors), update_net_latent_penalty_multiplier = 2 (the non-monotonic
#     sparsification optimum; held-out LL flat across all multipliers so no LL cost).
# auto_heldout_finetune is OFF (in-sample recovery study; held-out is the loader tail split).
#
# Same compute policy as Stage 3/4a: N=200, embed {4,8,16} x enc {none,scalar} = 6 cells.
entity: AIND-disRNN
project: embedding_recovery
name: disrnn-stage4a-h200-scalar

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage4a
  - model=disrnn
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.batch_size=512
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - model.architecture.multisubject=true
  - model.penalties.beta=0.001
  - model.penalties.update_net_latent_penalty_multiplier=2
  - model.training.lambda_reg_session=1.0
  - model.training.n_steps=50000
  - model.training.lr=0.001
  - model.training.checkpoint_every_n_steps=5000
  - model.training.auto_heldout_finetune.enabled=false
  - "wandb.tags=[embedding-recovery,stage4a,disrnn,mixture_family]"
  - ${args_no_hyphens}

parameters:
  model.architecture.session_encoding_type:
    values: [scalar]
  model.architecture.subject_embedding_size:
    values: [4, 8]
  seed:
    values: [42]
