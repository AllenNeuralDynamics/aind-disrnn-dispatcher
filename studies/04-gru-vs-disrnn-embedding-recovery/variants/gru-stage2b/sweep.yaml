# embedding-recovery / gru-stage2b — STRONGER + NON-MONOTONIC drift, HELD-OUT-SESSION eval.
#
# Stage 2 (mild monotonic drift) was near-invisible at the likelihood level: a static
# per-subject fit absorbs a smooth ramp into its session-average, AND the interleaved
# eval split let the model interpolate the drift. Stage 2b fixes BOTH:
#   - agent=hierarchical_rl_stage2b: magnitude x2, softmax NON-MONOTONIC (sinusoidal),
#     + session_noise (per-session jitter a static fit cannot absorb).
#   - data.heldout_session_mode=tail: the LAST 20% of each subject's sessions are the
#     held-out eval block -> the model must EXTRAPOLATE drift, and the GRU-vs-baseline
#     likelihood comparison is on genuinely unseen sessions (fair model comparison,
#     Han 2026-07-05). baseline_rl reads the same train/eval split from loader metadata.
#
# COMPUTE POLICY (Han 2026-07-05): Stage 1 settled hidden=16, embed=4 and mapped
# recovery-vs-#subjects, so we fix num_subjects=200 (recovery sweet spot) and sweep
# ONLY the scientifically-new axis: session_encoding {none, scalar}. 2 GRU cells.

entity: AIND-disRNN
project: embedding_recovery
name: gru-stage2b

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage2b        # STRONGER + NON-MONOTONIC drift + noise
  - model=gru
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.batch_size=512
  - data.eval_every_n=2
  - data.heldout_session_mode=tail            # contiguous last-20% held out (extrapolation)
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - model.architecture.multisubject=true
  - model.architecture.hidden_size=16
  - model.architecture.subject_embedding_size=4
  - model.training.lambda_reg_session=1.0
  - model.training.n_steps=50000
  - model.training.lr=0.001
  - model.training.checkpoint_every_n_steps=5000
  - model.training.auto_heldout_finetune.enabled=false
  - "wandb.tags=[embedding-recovery,stage2b,gru]"
  - ${args_no_hyphens}

parameters:
  model.architecture.session_encoding_type:
    values: [none, scalar]
  seed:
    values: [42]
