# embedding-recovery / gru-stage4a — MIXTURE OF MODEL FAMILIES (QLearning / CompareToThreshold
# / LossCounting), one family per subject, held-out-tail eval.
#
# Stage 4a raises the mixture axis from "which QL variant" (Stage 3) to "which algorithm
# FAMILY" — genuinely distinct base classes. PRIMARY recovery axis: FAMILY decoding from
# the subject embedding + confusion matrix (within-family param R2 is not cross-comparable
# across families). Baselines = 3 fixed fitters (Bari/CTT/LossCounting); model-selection
# recovers family (here CTT/LossCounting are CORRECT for the subjects they generated).
#
# Same compute policy as Stage 3: N=200, embed sweep {4,8,16} x enc {none,scalar}=6 cells,
# hidden=32.
entity: AIND-disRNN
project: embedding_recovery
name: gru-stage4a

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage4a
  - model=gru
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.batch_size=512
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - model.architecture.multisubject=true
  - model.architecture.hidden_size=32
  - model.training.lambda_reg_session=1.0
  - model.training.n_steps=50000
  - model.training.lr=0.001
  - model.training.checkpoint_every_n_steps=5000
  - model.training.auto_heldout_finetune.enabled=false
  - "wandb.tags=[embedding-recovery,stage4a,gru,mixture_family]"
  - ${args_no_hyphens}

parameters:
  model.architecture.session_encoding_type:
    values: [none, scalar]
  model.architecture.subject_embedding_size:
    values: [4, 8, 16]
  seed:
    values: [42]
