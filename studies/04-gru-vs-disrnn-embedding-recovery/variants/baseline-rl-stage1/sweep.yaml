# embedding-recovery / baseline-rl-stage1 — correct-model-class recovery reference.
#
# Fits an independent ForagerQLearning (scipy differential-evolution) per subject
# on the SAME synthetic data as gru-stage1. Two roles:
#   (1) likelihood ceiling: likelihood_relative_to_groundtruth ~1.0 when the
#       fitter's structure matches the generator (correctly specified).
#   (2) parametric recovery ceiling: fitted_params_per_subject vs the true
#       centroids -> the best achievable (learn_rate, biasL, softmax_inv_temp)
#       recovery, against which the GRU's embedding recovery is compared.
#
# CRITICAL: the baseline_rl fitter's DEFAULT structure (number_of_forget_rate=1,
# choice_kernel=one_step) is RICHER than the generator. We OVERRIDE it here to
# EXACTLY match the generator (forget=0, choice_kernel=none) so recovered params
# map 1:1 to the 3 generating params. A mismatched fitter still fits well but its
# params don't align with ground truth.

entity: AIND-disRNN
project: embedding_recovery
name: baseline-rl-stage1

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - model=baseline_rl
  # --- identical synthetic data to gru-stage1 (num_subjects swept below) ---
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.eval_every_n=2
  - data/task=random_walk
  - data.task.reward_baiting=false
  # --- structure-match the generator so recovery is 1:1 (see header) ---
  - model.agent_kwargs.number_of_learning_rate=1
  - model.agent_kwargs.number_of_forget_rate=0
  - model.agent_kwargs.choice_kernel=none
  - model.agent_kwargs.action_selection=softmax
  - "wandb.tags=[embedding-recovery,stage1,baseline_rl,reference]"
  - ${args_no_hyphens}

parameters:
  data.num_subjects:
    values: [50, 100, 200, 300]
  seed:
    values: [42]
