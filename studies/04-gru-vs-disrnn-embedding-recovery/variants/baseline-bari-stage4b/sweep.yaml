# embedding-recovery / baseline-bari-stage4b — FIXED bari fitter on Stage-4b per-session
# family-switching data. One of THREE FIXED baselines (Bari/CTT/LossCounting). Fits a SINGLE
# model type to ALL 200 subjects on the SAME Stage-4b data + SAME tail held-out split as
# gru-stage4b. Model-selection over the three gives a per-SUBJECT family call — the reference
# a data-driven session embedding is compared against, since a fixed per-subject fit cannot
# express within-subject family switching.
entity: AIND-disRNN
project: embedding_recovery
name: baseline-bari-stage4b

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage4b
  - model=baseline_rl_bari
  - model.multisubject_subject_workers=48
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - "wandb.tags=[embedding-recovery,stage4b,baseline_rl,bari,reference]"
  - ${args_no_hyphens}

parameters:
  seed:
    values: [42]
