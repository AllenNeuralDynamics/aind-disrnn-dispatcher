# embedding-recovery / gru-stage4b-concentration — MIXTURE-CONCENTRATION SWEEP.
#
# Follow-up to gru-stage4b, which found "session conditioning adds nothing" for
# per-session family switching. That null is CONFOUNDED: Stage-4b draws each
# subject's family mixture from Dirichlet(0.5), which is sparse enough that a
# subject is nearly single-family — so a session's family is essentially fixed by
# subject identity, leaving no within-subject per-session variation for a SESSION
# embedding to decode. This variant sweeps the Dirichlet concentration so subjects
# genuinely mix families across sessions, turning the null into a real curve:
#   does the {scalar} session-conditioning recovery benefit over {none} RISE with
#   concentration (more within-subject session mixing)?
# Prediction: at low concentration scalar≈none (subject identity suffices); as
# concentration grows the per-session family carries independent information and
# scalar should pull ahead on per-session family decoding.
#
# Everything else is held identical to gru-stage4b (N=200, tail held-out, GRU
# hidden=32, 50k steps). Embedding size is FIXED at 16 (the best-identifiability
# point from gru-stage4b) to isolate the concentration × session-conditioning
# interaction. Recovery (mix-weight R², per-session family decoding) is scored
# post-hoc by analysis/stage4b_recovery.py, not in the sweep.
entity: AIND-disRNN
project: embedding_recovery
name: gru-stage4b-concentration

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage4b
  - model=gru
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.batch_size=512
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - model.architecture.multisubject=true
  - model.architecture.hidden_size=32
  - model.architecture.subject_embedding_size=16
  - model.training.lambda_reg_session=1.0
  - model.training.n_steps=50000
  - model.training.lr=0.001
  - model.training.checkpoint_every_n_steps=5000
  - model.training.auto_heldout_finetune.enabled=false
  # NOTE: the resumable launcher sets the W&B GROUP (env WANDB_RUN_GROUP) but NOT the
  # project — Hydra's wandb.project defaults to `test`, so it MUST be set here or runs
  # land in the wrong project (unlike the native launcher, whose sweep controller owns it).
  - wandb.project=embedding_recovery
  - wandb.entity=AIND-disRNN
  - "wandb.tags=[embedding-recovery,stage4b,gru,mixture_family_switching,concentration_scan]"
  - ${args_no_hyphens}

parameters:
  data.agent.subject_presets.session_switching.concentration:
    values: [0.5, 1.0, 2.0, 5.0]
  model.architecture.session_encoding_type:
    values: [none, scalar]
  seed:
    values: [42, 43]
