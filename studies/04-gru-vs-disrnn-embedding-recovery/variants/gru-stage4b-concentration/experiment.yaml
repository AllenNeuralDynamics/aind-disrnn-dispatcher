# Task template for variant gru-stage4b-concentration (consumed by
# launch_beaker_resumable.py). The launcher expands the sweep grid into one
# autoResume task per (concentration × session_encoding_type × seed) point = 16 tasks.
#
# COMPUTE: SYNTHETIC study — data is generated on-the-fly, NO AWS S3 / DB access is
# needed. Routed to the AWS + on-prem H200 pools (both free), NOT gcp-h100: the GCP
# hosts only have ~100 GB host disk and have hit "no space left on device" before.
# Small GRU (hidden=32), fits any H-class GPU; gpuCount:1 with no explicit cpu/memory
# so Beaker assigns exactly one node bundle (avoids the multi-GPU over-grab). Low-
# priority preemptible so it bursts across the free H200 slots and auto-resumes from
# the 5k-step checkpoints if evicted.
#
# Refs point at ai_hub_pck_integration (where study 04 now lives after the
# feat/embedding-recovery merge). The entrypoint git-pulls these at container startup
# — no image rebuild for code/config changes.
version: v2
description: >
  gru-stage4b-concentration — 16-task Dirichlet-concentration sweep
  (concentration {0.5,1,2,5} x session_encoding {none,scalar} x seed {42,43})
  testing whether session-conditioning recovery benefit rises with within-subject
  family mixing. Synthetic ground truth, tail held-out, GRU hidden=32.
tasks:
  - name: gru-stage4b-concentration-template
    image:
      beaker: han-hou/disrnn-wrapper-pck-integration-20260630
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    context:
      priority: low
      preemptible: true
    constraints:
      cluster:
        - ai1/octo-hub-aws-h200
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: DISRNN_OUTPUT_DIR
        value: /results
      - name: WRAPPER_REF
        value: ai_hub_pck_integration
      - name: DISPATCHER_REF
        value: ai_hub_pck_integration
    result:
      path: /results
