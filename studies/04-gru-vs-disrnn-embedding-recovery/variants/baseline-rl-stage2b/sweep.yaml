# embedding-recovery / baseline-rl-stage2b — static fitter on STRONG-drift data, HELD-OUT-SESSION.
#
# Static per-subject ForagerQLearning (scipy DE) on the same Stage-2b strong/non-monotonic
# drift data as gru-stage2b, with the SAME tail held-out split (reads loader metadata).
# PREDICTION: with stronger + non-monotonic drift AND extrapolation-forcing tail holdout,
# the static fit finally drops clearly below ceiling on held-out sessions -> the clean
# baseline-flip Stage 2 lacked. num_subjects=200 (compute policy). heldout_refit disabled.

entity: AIND-disRNN
project: embedding_recovery
name: baseline-rl-stage2b

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage2b
  - model=baseline_rl
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - model.agent_kwargs.number_of_learning_rate=1
  - model.agent_kwargs.number_of_forget_rate=0
  - model.agent_kwargs.choice_kernel=none
  - model.agent_kwargs.action_selection=softmax
  - model.heldout_refit.enabled=false
  - "wandb.tags=[embedding-recovery,stage2b,baseline_rl,reference]"
  - ${args_no_hyphens}

parameters:
  seed:
    values: [42]
