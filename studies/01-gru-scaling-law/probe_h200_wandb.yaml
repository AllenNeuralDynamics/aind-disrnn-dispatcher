# Lightweight probe: can the onprem-H200 cluster reach W&B's run-creation path?
# The data-scaling sweep was moved to AWS L40s on 2026-06-22 because every
# wandb.init on onprem-H200 timed out (W&B itself + AWS were fine). onprem→W&B can
# only be tested from onprem, so this submits a tiny CPU task that does a real
# wandb.init (run creation, the exact call that hung) with a short timeout and
# exits. Submit it periodically; if it prints WANDB_OK, the path has recovered and
# the sweep can move back to the faster/bigger onprem-H200.
#   beaker experiment create -w ai1/aind-dynamic-foraging-foundation-model \
#     studies/data-scaling-law/probe_h200_wandb.yaml
version: v2
description: onprem-H200 -> W&B run-creation connectivity probe
tasks:
  - name: h200-wandb-probe
    image:
      beaker: han-hou/disrnn-wrapper-pck-integration
    command:
      - python
      - -c
      - |
        import time, wandb
        t = time.time()
        r = wandb.init(project="conn_probe", settings=wandb.Settings(init_timeout=60))
        print(f"WANDB_OK {r.id} in {time.time()-t:.1f}s")
        r.finish()
    constraints:
      cluster:
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 0
      cpuCount: 1
      memory: 4GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
    result:
      path: /results
