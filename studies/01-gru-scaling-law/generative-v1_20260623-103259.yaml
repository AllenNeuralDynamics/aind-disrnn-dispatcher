version: v2
description: "generative-v1@20260623-103259 \u2014 1 generative-validation tasks from\
  \ 01KVQ7EJ3C5YJ8FJVNJB8C8N36"
tasks:
- name: generative-v1-d0-016-s0
  image:
    beaker: han-hou/disrnn-wrapper-pck-integration
  command:
  - bash
  - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
  - bash
  - -lc
  - "python -m run_analysis generative --model-dir /prior/run --split train --checkpoint-policy\
    \ best_eval --rollout-mode curriculum_matched --n-rollouts-per-session 1 --window-size\
    \ 10 --session-partitions train eval combined --output-dir /results/generative\
    \ && python -c 'import json,os,glob,wandb\nroot='\"'\"'/results/generative'\"\
    '\"'\nmeta={'\"'\"'study'\"'\"': '\"'\"'data-scaling-law'\"'\"', '\"'\"'variant'\"\
    '\"': '\"'\"'v1'\"'\"', '\"'\"'launch_id'\"'\"': '\"'\"'20260623-103259'\"'\"\
    ', '\"'\"'source_subject_ratio'\"'\"': '\"'\"'0.016'\"'\"', '\"'\"'source_seed'\"\
    '\"': '\"'\"'0'\"'\"', '\"'\"'source_dataset'\"'\"': '\"'\"'01KVQ7EJ3KA2BTA3Z1Y8K2WVMQ'\"\
    '\"', '\"'\"'source_exp'\"'\"': '\"'\"'01KVQ7EJ3C5YJ8FJVNJB8C8N36'\"'\"', '\"\
    '\"'kind'\"'\"': '\"'\"'generative'\"'\"'}\nname='\"'\"'generative-v1-d0.016-s0'\"\
    '\"'\nwandb.init(project=os.environ.get('\"'\"'WANDB_PROJECT'\"'\"'),entity=os.environ.get('\"\
    '\"'WANDB_ENTITY'\"'\"'),group=os.environ.get('\"'\"'WANDB_RUN_GROUP'\"'\"'),name=name,config={'\"\
    '\"'meta'\"'\"':meta})\nparts=['\"'\"'train'\"'\"','\"'\"'eval'\"'\"','\"'\"'combined'\"\
    '\"']\n_log={}\nfor part in parts:\n f=os.path.join(root,part,'\"'\"'model_vs_animal_quantitative_summary.json'\"\
    '\"')\n if not os.path.exists(f): continue\n stack=[([part],json.load(open(f)))]\n\
    \ while stack:\n  pre,obj=stack.pop()\n  for k,v in obj.items():\n   if isinstance(v,dict):\
    \ stack.append((pre+[str(k)],v))\n   elif isinstance(v,(int,float)) and not isinstance(v,bool):\
    \ _log['\"'\"'/'\"'\"'.join(pre+[str(k)])]=v\nif _log: wandb.log(_log)\nfor part\
    \ in parts:\n fig=os.path.join(root,part,'\"'\"'figures'\"'\"')\n if not os.path.isdir(fig):\
    \ continue\n imgs={part+'\"'\"'/'\"'\"'+os.path.splitext(os.path.basename(p))[0]:wandb.Image(p)\
    \ for p in sorted(glob.glob(os.path.join(fig,'\"'\"'*.png'\"'\"')))}\n if imgs:\
    \ wandb.log(imgs)\nwandb.finish()\n'"
  context:
    priority: low
    preemptible: true
  constraints:
    cluster:
    - ai1/octo-hub-aws-l40s
  resources:
    gpuCount: 1
    cpuCount: 12
    memory: 90GiB
  datasets:
  - mountPath: /prior
    source:
      beaker: 01KVQ7EJ3KA2BTA3Z1Y8K2WVMQ
  envVars:
  - name: WANDB_API_KEY
    secret: han-wandb-api-key
  - name: WANDB_PROJECT
    value: mice_data_scaling
  - name: WANDB_ENTITY
    value: AIND-disRNN
  - name: WANDB_RUN_GROUP
    value: generative-v1@20260623-103259
  - name: WRAPPER_REF
    value: bb4b052e8b92cf3973e1465f3f3f804343ec4e31
  - name: DISPATCHER_REF
    value: study/data-scaling-law
  result:
    path: /results
