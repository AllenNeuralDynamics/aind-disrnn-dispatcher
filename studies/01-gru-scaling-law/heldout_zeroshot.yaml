# Zero-shot held-out config: per-held-out-mouse likelihood with NO adaptation.
# Identical to heldout_offline.yaml EXCEPT the fine-tune budget is zero
# (heldout_finetuning.n_steps: 0, checkpoint_every_n_steps: 0). The wrapper's
# run_heldout_subject_finetuning_from_config evaluates the model at init only
# (evaluation_steps == [0]; no gradient steps because step == previous_step == 0),
# so the held-out subject embedding stays at its initialization and the resulting
# per_subject_likelihood.json / eval_likelihood is the ZERO-SHOT generalization.
# Verified against wrapper 4f29680 heldout_finetuning.py (the [0]-only eval path).
source_run:
  model_dir: /prior/run
  checkpoint_policy: best_eval

heldout_subjects:
  test_subject_ids: null     # inherit the reserved held-out set from the source run
  curricula: null
  min_sessions: null
  heldout_every_n: null
  mature_only: null
  cols_to_retain: null

heldout_finetuning:
  n_steps: 0                 # NO adaptation -> zero-shot (eval at init only)
  lr: 1e-3
  checkpoint_every_n_steps: 0
  batch_size: null
  batch_mode: single
  example_max_subjects: 1
  skip_subjects_with_insufficient_sessions: true
  keep_media_files: false

output:
  output_root: /results/heldout
  run_name_suffix: null

wandb: {}
seed: 0
