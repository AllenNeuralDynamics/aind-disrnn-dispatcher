# Few-shot adaptation-budget validation config (K=2): copy of heldout_offline.yaml +
# heldout_finetuning.adapt_sessions_per_subject=2 (cap each held-out subject's ADAPT
# (train) sessions to the first 2; EVAL split unchanged so held-out likelihood stays
# comparable across K). n_steps/lr match the offline baseline so the 2-shot number is
# comparable. Throwaway: used to validate the knob on ONE task before any K-sweep.
source_run:
  model_dir: /prior/run
  checkpoint_policy: best_eval

heldout_subjects:
  test_subject_ids: null     # inherit the reserved held-out set from the source run
  curricula: null
  min_sessions: null
  heldout_every_n: null
  mature_only: null
  cols_to_retain: null

heldout_finetuning:
  n_steps: 500
  lr: 1e-3
  checkpoint_every_n_steps: 100
  batch_size: null
  batch_mode: single
  example_max_subjects: 1
  skip_subjects_with_insufficient_sessions: true
  keep_media_files: false
  adapt_sessions_per_subject: 8

output:
  output_root: /results/heldout
  run_name_suffix: null

wandb: {}
seed: 0
