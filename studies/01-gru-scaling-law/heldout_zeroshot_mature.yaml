# mature-only variant (mature_only:true). heldout_every_n/min_sessions set to the
# source values so _selector_fields_present recognizes the override block (else mature_only
# is silently dropped to the source's false). Same held-out cohort, mature trials only.
source_run:
  model_dir: /prior/run
  checkpoint_policy: best_eval
heldout_subjects:
  test_subject_ids: null
  curricula: null
  min_sessions: 10
  heldout_every_n: 5
  mature_only: true
  cols_to_retain: null
heldout_finetuning:
  n_steps: 0
  lr: 1e-3
  checkpoint_every_n_steps: 0
  batch_size: null
  batch_mode: single
  example_max_subjects: 1
  skip_subjects_with_insufficient_sessions: true
  keep_media_files: false
output:
  output_root: /results/heldout
  run_name_suffix: null
wandb: {}
seed: 0
