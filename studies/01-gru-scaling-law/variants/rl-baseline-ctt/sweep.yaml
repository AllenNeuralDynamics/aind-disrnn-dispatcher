# Variant rl-baseline-ctt -- independent per-subject RL, BOTH cohorts.
#
# Agent: CompareToThreshold -- ForagerCompareThreshold (local income vs a learned threshold).
#
# Uses the STANDALONE model config `model=baseline_rl_ctt` (code/config/model/), which
# already exists and carries exactly this agent class's `agent_kwargs` -- no deep-merge
# of another class's structure. (This matters: the trainer constructs the agent as
# `agent_class_obj(**agent_kwargs, seed=seed)` with NO filtering, so a merged config
# would pass Q-learning kwargs to ForagerCompareThreshold and TypeError.)
#
# Fits BOTH cohorts in one run (`heldout_refit.skip_train_fit=false`):
#   * TRAIN (~614 mice)  -- per-subject fitted parameters, the `model2` that
#     `run_analysis embedding-params` / `likelihood-advantage` need. Only training
#     subjects have a learned GRU subject embedding, so this is the cohort that
#     unblocks embedding-vs-parameter analysis. `rl-baseline-simple` could NOT
#     supply it: it ran skip_train_fit=true and only ever touched held-out mice.
#   * HELDOUT (149 mice) -- refit + scored under `heldout/*`, matching the GRU
#     namespace, so r8's GRU-vs-RL comparison extends arm-for-arm.
#
# Bari + Hattori + CTT together close the "only Bari is fit" gap on issue #20.
#
# Fitted parameters (verified by constructing the agent):
#   learn_rate, threshold, softmax_inverse_temperature, biasL
#
# Launch from the dispatcher repo on Allen HPC:
#
#   conda activate disrnn-cpu
#   python code/launch_hpc.py \
#     --sweep-yaml studies/01-gru-scaling-law/variants/rl-baseline-ctt/sweep.yaml \
#     --mode cpu \
#     --sbatch-extra="--array=0-0 --nodes=1 --cpus-per-task=112 --mem=400G --time=72:00:00 --constraint=cpu" \
#     --agent-count 1

entity: AIND-disRNN
project: mice_data_scaling
name: rl-baseline-ctt-train-and-heldout

method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=baseline_rl_ctt
  - wandb.project=mice_data_scaling
  # Fit BOTH cohorts: the main training-subject fit AND the held-out refit.
  # (These model configs default to heldout_refit.enabled=false.)
  - model.heldout_refit.enabled=true
  - model.heldout_refit.skip_train_fit=false
  # Avoid nested CPU oversubscription: parallelize over subjects, not inside DE.
  - model.multisubject_subject_workers=112
  - +model.DE_kwargs.workers=1
  # Reduce plotting overhead; metrics come from aggregate likelihoods.
  - data.heldout_example_sessions_per_subject=0
  - data.train_example_sessions_per_subject=0
  - data.eval_example_sessions_per_subject=0
  - data.example_max_subjects=0
  - +meta.baseline_kind=train_and_heldout_independent_per_subject_rl
  - +meta.rl_model=ctt
  - "wandb.tags=[hpc,cpu,mice,baseline_rl,ctt,compare_to_threshold,rl-baseline-ctt,01-gru-scaling-law]"
  - ${args_no_hyphens}

parameters:
  seed:
    values: [0]
