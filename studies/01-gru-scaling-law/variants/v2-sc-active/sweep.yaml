# Variant v2-sc-active — re-run of the data-scaling sweep so session conditioning
# actually engages and trains, which v1 never reached (v1 early-stopped at ~40k, inside
# pretrain, lambda=0).
#
# Design (finalized 2026-06-22): lambda forward + gated early stop.
#   - pretrain=30k (plain GRU converges ~30-40k per v1), warmup 30k->50k => full lambda=1
#     at 50k. (v1 used the 30%/20% fraction of n_steps=300k => 90k/150k, far too late.)
#   - n_steps=150k gives headroom so early stopping can operate after the gate.
#   - early stopping ON but gated: start_after_step=70k (20k of full-lambda training first),
#     so it catches the small-D post-SC overfit (Po-chen's D=10 eval declined once lambda
#     engaged) while letting large-D keep improving toward 150k. Needs the wrapper's
#     early_stopping.start_after_step knob (WRAPPER_REF in experiment.yaml).
# Distinct W&B group (set by the launcher: v2-sc-active@<launch_id>) so it sits beside v1
# in the same project for comparison.

entity: AIND-disRNN
project: mice_data_scaling
name: mice-data-scaling-v2-sc-active          # informational; launcher sets the real group

method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=gru_scaling
  - wandb.project=mice_data_scaling
  - model.architecture.hidden_size=128
  - model.architecture.session_encoding_type=scalar
  # lambda forward: pretrain 30k, warmup 30k->50k => full session conditioning at 50k.
  - model.architecture.session_n_pretrain_steps=30000
  - model.architecture.session_n_warmup_steps=20000
  - model.training.n_steps=150000
  - model.training.lr=1e-5
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  # gated early stop: only arms at >=70k (20k after full lambda); catches post-SC overfit.
  - model.training.early_stopping.enabled=true
  - model.training.early_stopping.start_after_step=70000
  - ${args_no_hyphens}

parameters:
  data.subject_ratio:
    values: [0.016, 0.049, 0.163, 0.489, 1.0]
  seed:
    values: [0, 1, 2]
