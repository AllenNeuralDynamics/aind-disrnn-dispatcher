# Task template for variant v2-sc-active (consumed by launch_beaker_resumable.py).
# Differences from v1: WRAPPER_REF carries the wandb retry→offline-fallback safeguard +
# meta.note + early_stopping.start_after_step (the gated-early-stop knob v2 needs), and
# runs ONLINE (no WANDB_MODE=offline) — the v1 wandb-init failures were a TRANSIENT
# cluster→W&B outage (14 concurrent inits later confirmed fine), and the safeguard
# auto-falls-back to offline if init flakes again. If it falls back, sync per the root
# README "Syncing the offline W&B runs".
version: v2
description: data-scaling v2-sc-active template (one autoResume task per grid point)
tasks:
  - name: data-scaling-v2-template
    image:
      beaker: han-hou/disrnn-wrapper-pck-integration
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 16
      memory: 256GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: 65c3350d801c7596f88f57adef6f4d7e435b9c35   # study/data-scaling-law: + meta.note + early_stopping.start_after_step
      - name: DISPATCHER_REF
        value: study/data-scaling-law
      # (online by default; safeguard auto-falls-back to offline on a flaky init)
    result:
      path: /results
