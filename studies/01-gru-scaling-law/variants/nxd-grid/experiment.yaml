# Task template for variant nxd-grid (consumed by launch_beaker_resumable.py).
# Same shape as v2-sc-active; the launcher expands the sweep grid into one autoResume
# task per (hidden_size × subject_ratio × seed) point. WRAPPER_REF pinned to the
# per_subject_likelihood + early_stopping.start_after_step commit; DISPATCHER_REF on the
# study branch. Runs ONLINE (no WANDB_MODE=offline); the wrapper safeguard auto-falls-back
# to offline on a flaky W&B init — sync per the root README if so.
version: v2
description: data-scaling nxd-grid template (one autoResume task per grid point)
tasks:
  - name: data-scaling-nxd-template
    image:
      beaker: han-hou/disrnn-wrapper-pck-integration
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 16
      memory: 256GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: 4f296807f4ea06f9a58afa4eeb0553c220db4726   # per_subject_likelihood.json + early_stopping.start_after_step
      - name: DISPATCHER_REF
        value: study/data-scaling-law
      # (online by default; safeguard auto-falls-back to offline on a flaky init)
    result:
      path: /results
