# Task template for the nxd-grid D=30 gap-fill on g6e L40S.
# 90GiB / 12 CPU stays within one L40S GPU bundle on g6e (~93GiB, 12 CPU).
version: v2
description: data-scaling nxd-grid D30 template on g6e (one autoResume task per grid point)
tasks:
  - name: data-scaling-nxd-d30-template
    image:
      beaker: han-hou/disrnn-wrapper-pck-integration
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo.ai-aws-g6e
    resources:
      gpuCount: 1
      cpuCount: 12
      memory: 90GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: 4f296807f4ea06f9a58afa4eeb0553c220db4726
      - name: DISPATCHER_REF
        value: study/data-scaling-law
    result:
      path: /results
