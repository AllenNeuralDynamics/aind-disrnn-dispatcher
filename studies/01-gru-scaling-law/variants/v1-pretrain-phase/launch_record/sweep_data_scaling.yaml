# Data-scaling law: held-out-mouse generalization vs # training mice (D).
#
# Fixed model size (H128), train to convergence; the ONLY swept science axis is
# data.subject_ratio (the D dial — a scalar that broadcasts to all curricula, so
# composition stays at the natural pool proportions). seed gives 3 nested ladders
# (the loader's permutation-prefix sampling makes D=10 ⊂ D=30 ⊂ ... for a fixed
# seed; held-out cohort is fixed by heldout_every_n=5, independent of ratio/seed).
#
# Launch with the RESUMABLE per-grid-point launcher (one autoResume task each):
#   python code/launch_beaker_resumable.py \
#     --sweep studies/data-scaling-law/sweep_data_scaling.yaml \
#     --experiment studies/data-scaling-law/experiment_data_scaling.yaml
#
# Fixed values live in code/config/model/gru_scaling.yaml + data/mice_snapshot_scaling.yaml;
# the command below overrides only what this study pins differently.

entity: AIND-disRNN
project: mice_data_scaling
name: mice-data-scaling-gru

method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=gru_scaling
  - wandb.project=mice_data_scaling
  - model.architecture.hidden_size=128
  - model.architecture.session_encoding_type=scalar   # session conditioning ON (gru_scaling default)
  - model.training.n_steps=300000
  - model.training.lr=1e-5
  # Minimal eval DURING training: no per-checkpoint held-out passes (expensive),
  # but keep ONE final held-out fine-tune+test at the end (auto_heldout_finetune,
  # default enabled) -> the y-axis. Can also be re-run offline from the checkpoint.
  - model.training.checkpoint_run_heldout_eval=false
  - ${args_no_hyphens}

parameters:
  # D dial: pool ≈ 614 at 1.0 -> D ≈ {10, 30, 100, 300, ~614}. Actual D per run is
  # read from the loader's "[select 6/6] final training selection" log.
  data.subject_ratio:
    values: [0.016, 0.049, 0.163, 0.489, 1.0]
  seed:
    values: [0, 1, 2]
