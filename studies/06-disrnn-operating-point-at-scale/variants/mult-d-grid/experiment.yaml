# Task template for variant mult-d-grid (consumed by launch_beaker_resumable.py).
# The launcher expands the sweep grid into one autoResume task per (D×mult×beta×seed) point = 80 tasks.
#
# COMPUTE: same small disRNN as study 03/05 (latent_size=5, update-net 16×5, LINEAR choice net) —
# nothing like the wide GRU H256 that needs H200's 141 GB. Fits comfortably on a 48 GB L40S at one
# 90GiB / 12-CPU bundle (= exactly 1 L40S GPU). Growing D to 614 grows the subject-embedding table
# (614 × 4 floats) and the host-side session cache, not the per-step GPU footprint (batch fixed at
# 2048) — already confirmed by 05/smoke-d614; the penalty axes (mult, beta) are GPU-footprint-neutral.
#
# CLUSTER ALLOWLIST: g6e/p5en preemptible exceptions were REVOKED 2026-07-18 (jobs pend in `created`
# forever) — excluded. GCP pools stay excluded (cannot reach the AWS S3 database). That leaves the AWS
# L40S pool (primary; this model needs no more) plus the two hub H200 pools purely for CONCURRENCY —
# listing all three lets the scheduler place as many of the 80 tasks at once as capacity allows instead
# of draining in one wave at identical GPU-hours. H200 is NOT faster here (AGENTS §10). At 80 tasks,
# expect multiple waves regardless of concurrency — check_gpu_availability.py before submitting.
#
# ⚠️ IMAGE REF: verify the CURRENT wrapper image at launch time before submitting (sandbox-launch
# reference: stale image name is the #1 trap). Study 06 SHOULD run the latest wrapper — it carries
# the off-curriculum task-family fix (#60) and the embedding-plot fixes (#61) that post-date study
# 05's runs, and any follow-on generative rollouts depend on #60. The value below is study 05's image
# as a placeholder; the launcher pins WRAPPER_REF/DISPATCHER_REF to resolved SHAs regardless.
#
# The launcher pins {priority: low, preemptible: true} (AGENTS §10 tier 3): tasks ride the
# ~unlimited low-preemptible tier and burst past the 8-slot cap; eviction is recovered by autoResume
# + the trainer's full-state checkpoint (checkpoint_every_n_steps=10000).
#
# Runtime refs stay readable as `main`; the launcher resolves them to immutable SHAs before
# submission (required for resumable/preemptible — a preempted task re-checks-out the ref).
version: v2
description: >
  disRNN operating-point-at-scale grid — 80-task grid over D (subject_ratio) × multiplier ×
  beta × seed, lr=1e-3, n_steps=100000, 2-way output, fixed held-out cohort. Measures the
  penalty×D surface directly (motivated by r1's zero-compute selection plot, which showed beta
  cannot be fixed a priori — see sweep.yaml header and analysis/reports/r1-penalty-selection.md).
tasks:
  - name: disrnn-mult-d-grid-template
    image:
      beaker: han-hou/disrnn-wrapper-main-20260712   # ⚠️ verify latest at launch (see header)
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo-hub-aws-l40s
        - ai1/octo-hub-aws-h200
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 12
      memory: 90GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: DISPATCHER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: FORAGING_MODELS_REF
        value: main  # readable source ref; launcher submits the resolved SHA
    result:
      path: /results
