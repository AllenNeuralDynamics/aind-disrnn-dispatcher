# W&B sweep for 06-disrnn-operating-point-at-scale / mult-d-grid — the reconciling D×mult×β surface.
# Consumed by launch_beaker_resumable.py: one autoResume Beaker task per (D×mult×beta×seed) = 80.
#
# QUESTION. Study 03 (D=100, fixed penalty axis swept) found sparsity is FREE across the multiplier;
# study 05 (D=614, fixed penalty) found it costs ~half the GRU gap. This grid measures the penalty×D
# surface directly instead of inferring it from two fixed-axis studies (study README, "Why this study
# exists").
#
# DESIGN HISTORY (why this is not the single-operating-point scan first drafted). The original wave-1
# plan fixed the penalty at study 05's wave-2 winner (mult=1, beta=3e-4) and scanned D only. r1
# (analysis/reports/r1-penalty-selection.md), a ZERO-NEW-COMPUTE selection plot built from existing
# study 03 + 05 runs, overturned that: beta=3e-4 is simultaneously the HIGHEST held-out AND the MOST
# OVERFIT penalty (in-sample-vs-held-out gap widens with D: +0.0027 at D=100 -> +0.0083 at D=614). So
# beta cannot be fixed a priori — it has to be IN the grid, not scanned around.
#
# GRID (80 tasks):
#   D           in {10, 30, 100, 300, 614}   — study 01/03/05's ladder (subject_ratio below)
#   mult        in {1, 2, 5, 10}             — study 03's multiplier ladder
#   beta        in {3e-4, 1e-3}              — r1's two live candidates (best-heldout vs
#                                               least-overfit). beta=3e-3 DROPPED: r1 shows it
#                                               already underfits at BOTH D=100 and D=614
#                                               (heldout 0.7107 / 0.7102) — a known-dead sheet.
#   seed        in {0, 1}                    — 2 seeds: study 05 measured held-out SD~0.0005 at
#                                               this config family; the effects this grid resolves
#                                               (multiplier's held-out cost, ~0.003-0.006 at D=614)
#                                               are 6-12x that SD, so 2 seeds (SEM ~0.0004) clears
#                                               them. Openness readouts are secondary here (05 showed
#                                               high seed SD on openness); cite 05's 3-seed bars for
#                                               those rather than re-deriving from this grid's 2.
#
# TRAINING BUDGET: n_steps RAISED to 100000 (05 used 60000) to (a) match study 01's GRU budget and
# (b) extend the full-session-conditioning window from 10k to 50k steps (SC schedule — pretrain 30k +
# warmup 20k — kept fixed, identical to 03/05). Isolate this from the penalty effect by reading the
# 60k checkpoint where needed (checkpoint_every_n_steps=10000 below).
#
# Cohorts are nested per seed (permutation-prefix sampling); `seed` drives BOTH mouse selection and
# init, so seed-averaging captures sampling variability (study 01/05 README).
#
# disRNN-trainer NOTES (do NOT copy the gru_scaling sweeps verbatim):
#   * NO early_stopping key — gru_trainer-only; Hydra errors on it for disRNN. Full n_steps always.
#   * n_warmup_steps is the disRNN *penalty* ramp (~5% of n_steps, Po-Chen convention).
#   * lr=1e-3, NOT 5e-3: both study-03 mult=10 NaN divergences were at lr=5e-3.
entity: AIND-disRNN
project: disrnn_data_scaling
name: disrnn-mult-d-grid            # informational; launcher sets the real group
method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize
command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=disrnn
  - wandb.project=disrnn_data_scaling
  # --- cohort: D is a swept axis (below); 2-way output, comparable to study 01/03/05 ---
  - data.ignore_policy=exclude
  # --- architecture: linear choice net (Kevin) + disRNN defaults, identical to study 03/05 ---
  - model.architecture.choice_net_n_layers=0
  - model.architecture.latent_size=5
  - model.architecture.update_net_n_units_per_layer=16
  - model.architecture.update_net_n_layers=5
  # --- scalar session conditioning (lambda-forward): full SC at 50k, identical to 03/05 ---
  - model.architecture.session_encoding_type=scalar
  - model.architecture.session_n_pretrain_steps=30000
  - model.architecture.session_n_warmup_steps=20000
  # --- lr pinned to the non-divergent value (study 03: both NaNs were at lr=5e-3) ---
  - model.training.lr=1e-3
  # --- training budget: RAISED to 100000 (05 used 60000) — GRU-parity + full-SC window (see header) ---
  - model.training.n_steps=100000
  - model.training.n_warmup_steps=7500
  - model.training.checkpoint_every_n_steps=10000
  - model.training.checkpoint_run_heldout_eval=false
  # --- length-bucketed batching: trim per-batch unroll to the batch's session length ---
  - model.training.length_bucketing=true
  - model.training.length_bucket_grid=128
  - ${args_no_hyphens}
parameters:
  data.subject_ratio:
    values: [0.016, 0.049, 0.163, 0.489, 1.0]   # D ~= 10, 30, 100, 300, 614
  model.penalties.update_net_latent_penalty_multiplier:
    values: [1, 2, 5, 10]
  model.penalties.beta:
    values: [3e-4, 1e-3]
  seed:
    values: [0, 1]
