# Variant validation-2way-vs-3way — smoke + first-look for the include-ignore-trials study.
#
# Goal: prove the 3-way (output_size=3) pipeline runs end-to-end on Beaker and give a first,
# matched look at the effect of adding the ignored-trial class. Same data (D≈10, seed 0), same
# model/training knobs; the ONLY swept axis is data.ignore_policy ∈ {exclude, include}, which the
# wrapper maps to output_size 2 vs 3 (auto-derived + validated in gru_trainer.py).
#
# SHORT training (n_steps=20000, checkpoint every 5k) so both cells finish quickly — this is a
# validation run, NOT a science result. subject_ratio=0.016 => D≈10 (smallest ladder rung).
# Held-out fine-tune+test still runs at the end (auto_heldout_finetune) so we get a held-out
# likelihood per cell to eyeball the ignore effect.
#
# NOTE: 3-way NL has a different chance baseline (1/3) than 2-way (1/2) and covers a different
# trial support (include keeps ignore trials). Do NOT subtract the two likelihoods directly; this
# smoke only checks (a) the 3-way path trains without error and (b) the qualitative ignore-class
# behavior. Distinct W&B group (launcher sets validation-2way-vs-3way@<launch_id>).

entity: AIND-disRNN
project: mice_ignore_scaling
name: mice-ignore-validation-2way-vs-3way      # informational; launcher sets the real group

method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=gru_scaling
  - wandb.project=mice_ignore_scaling
  - model.architecture.hidden_size=128
  - model.architecture.session_encoding_type=scalar
  # lambda forward compressed to the short smoke budget: pretrain 6k, warmup 6k->10k => full SC @10k.
  - model.architecture.session_n_pretrain_steps=6000
  - model.architecture.session_n_warmup_steps=4000
  - model.training.n_steps=20000
  - model.training.checkpoint_every_n_steps=5000
  - model.training.lr=1e-5
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  - data.subject_ratio=0.016
  - seed=0
  - ${args_no_hyphens}

parameters:
  data.ignore_policy:
    values: ["exclude", "include"]
