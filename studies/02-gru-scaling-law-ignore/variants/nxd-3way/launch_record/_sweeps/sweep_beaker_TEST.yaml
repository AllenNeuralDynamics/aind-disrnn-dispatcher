# 1-cell image test
# Variant nxd-3way — N×D joint-scaling grid with the 3-way (include-ignore-trials) output.
#
# Exact mirror of data-scaling-law/variants/nxd-grid, with the SINGLE change
# data.ignore_policy=include (=> output_size 3, L/R/ignore, auto-derived + validated by the
# wrapper). This lets us ask the r7 question on a headroom-ier target: does D keep helping
# past ~100 mice when the model must also predict engagement/ignore?
#
# Grid: hidden_size ∈ {16, 64, 128, 256} × subject_ratio ∈ {0.016, 0.049, 0.163, 1.0}
#        (D≈10/30/100/614) × seed ∈ {0, 1, 2} = 48 tasks.
# (r7 combined H128 from v2-sc-active with H{16,64,256}; here we run the full 4×4 in ONE
# variant so all cells share ignore_policy=include and one launch — no cross-variant reuse.)
#
# All other knobs identical to nxd-grid / v2-sc-active: scalar SC, lambda forward (full SC @50k),
# n_steps=150k, lr=1e-5, gated early stop @70k, length bucketing, per-checkpoint heldout eval OFF.
# Distinct W&B group (launcher sets nxd-3way@<launch_id>) in project mice_ignore_scaling.

entity: AIND-disRNN
project: mice_ignore_scaling
name: mice-ignore-nxd-3way              # informational; launcher sets the real group

method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=gru_scaling
  - wandb.project=mice_ignore_scaling
  - data.ignore_policy=include            # the one change vs data-scaling-law nxd-grid (=> output_size 3)
  - model.architecture.session_encoding_type=scalar
  # lambda forward: pretrain 30k, warmup 30k->50k => full session conditioning at 50k.
  - model.architecture.session_n_pretrain_steps=30000
  - model.architecture.session_n_warmup_steps=20000
  - model.training.n_steps=150000
  - model.training.lr=1e-5
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  # gated early stop: only arms at >=70k (20k after full lambda); catches post-SC overfit.
  - model.training.early_stopping.enabled=true
  - model.training.early_stopping.start_after_step=70000
  - ${args_no_hyphens}

parameters:
  model.architecture.hidden_size:
    values: [16]
  data.subject_ratio:
    values: [1.0]
  seed:
    values: [0]
