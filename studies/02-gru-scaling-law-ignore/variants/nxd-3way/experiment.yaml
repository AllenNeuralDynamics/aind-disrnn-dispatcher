# Task template for variant nxd-3way (consumed by launch_beaker_resumable.py).
# The grid spans hidden_size {16,64,128,256}; H256 needs H200's 141GB (a 48GB L40S OOMs on the
# wide model — see beaker-launch skill), so route the whole grid to octo-hub-onprem-h200 with the
# same 256GiB/16CPU/1-GPU sizing that v2-sc-active used successfully. If H200 is contended, render
# --no-submit and split the narrow-N tasks (H16/H64) onto g6e L40S (90GiB/12CPU) per task, per the
# beaker-launch skill's per-task-edit recipe.
version: v2
description: ignore-trials nxd-3way template (one autoResume task per grid point)
tasks:
  - name: ignore-nxd-3way-template
    image:
      beaker: han-hou/disrnn-wrapper-main-20260712
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 16
      memory: 256GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: DISPATCHER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: FORAGING_MODELS_REF
        value: main  # readable source ref; launcher submits the resolved SHA
    result:
      path: /results
