# Pinned analysis env for studies/ignore-trials-scaling/ per docs/posthoc-analysis.md.
#
# The one line the analysis provenance depends on is the wrapper pin below:
# _meta.build_meta() parses `aind-disrnn-wrapper.git@<sha>` from this file and
# stamps it into every scaling.json as _meta.wrapper_git_sha. That sha is the
# version of aind-disrnn-wrapper whose post_training_analysis produced the W&B
# held-out keys this study reads (see analysis/wandb_keys.py).
