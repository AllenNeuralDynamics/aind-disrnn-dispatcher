# 1-task SMOKE for beta-scan: proves the real-time bottleneck-sparsity logging
# (wrapper 5cb7154) actually emits bottlenecks/* on real JAX params before the 48-run grid.
# Short budget + early checkpoint so sparsity logs fire within minutes. NOT a science run.
# Single grid point (multiplier=5 = the diverging value Po-Chen used @10 mice; base beta=1e-3;
# lr=1e-3; seed=0). Everything else mirrors updnet-ratio-100mice.
entity: AIND-disRNN
project: mice_beta_scan
name: mice-beta-scan-smoke
method: grid
metric:
  name: final/bottlenecks/update_net_latent_frac_open
  goal: minimize
command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=disrnn
  - wandb.project=mice_beta_scan
  - data.subject_ratio=0.163
  - data.ignore_policy=exclude
  - model.architecture.choice_net_n_layers=0
  - model.architecture.latent_size=5
  - model.architecture.update_net_n_units_per_layer=16
  - model.architecture.update_net_n_layers=5
  - model.architecture.session_encoding_type=scalar
  - model.architecture.session_n_pretrain_steps=2000
  - model.architecture.session_n_warmup_steps=1000
  - model.training.n_steps=6000
  - model.training.n_warmup_steps=500
  - model.training.checkpoint_every_n_steps=2000
  - model.training.checkpoint_run_heldout_eval=false
  - ${args_no_hyphens}
parameters:
  model.penalties.update_net_latent_penalty_multiplier:
    values: [5]
  model.penalties.beta:
    values: [1e-3]
  model.training.lr:
    values: [1e-3]
  seed:
    values: [0]
