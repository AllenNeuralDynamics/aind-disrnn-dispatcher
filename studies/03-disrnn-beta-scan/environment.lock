# numpy + matplotlib; it reads the committed grid CSV and talks to W&B (when
# re-pulling) over raw GraphQL (requests), not the wandb SDK. The wrapper pin
# documents the PRODUCER of the metrics, not an import dependency of the analysis.
#
# Producer (training + metrics-writing) wrapper commit:
