# RULE-PLOT RERUN: single cell restoring the study's best INTERPRETABLE disRNN run
# 3dcb9217 (mult=2, beta=3e-4, lr=1e-3, seed=1, held-out LL 0.7179) to regenerate the
# update-rule / choice-rule figures that the beta-scan sweep left disabled by default.
# Restores 3dcb9217's uploaded checkpoint via restore_from_run_id, keeps n_steps=60000
# (== source horizon), so the main loop `while steps_completed < n_steps` trains ZERO
# extra steps and goes straight to final plotting. plot_choice_rule / plot_update_rules
# are turned ON here; held-out finetune is OFF (we already have this cell's held-out LL).
entity: AIND-disRNN
project: disrnn_updnet_bottleneck_ratio_100mice
name: mice-beta-scan-updnet-ratio-100mice
method: grid
metric:
  name: final/bottlenecks/update_net_latent_frac_open
  goal: minimize
command:
- python
- -m
- run_hpc
- data=mice_snapshot_scaling
- model=disrnn
- wandb.project=disrnn_updnet_bottleneck_ratio_100mice
- data.subject_ratio=0.163
- data.ignore_policy=exclude
- model.architecture.choice_net_n_layers=0
- model.architecture.latent_size=5
- model.architecture.update_net_n_units_per_layer=16
- model.architecture.update_net_n_layers=5
- model.architecture.session_encoding_type=scalar
- model.architecture.session_n_pretrain_steps=30000
- model.architecture.session_n_warmup_steps=20000
- model.training.n_steps=60000
- model.training.n_warmup_steps=7500
- model.training.checkpoint_every_n_steps=10000
- model.training.checkpoint_run_heldout_eval=false
- model.training.length_bucketing=true
- model.training.length_bucket_grid=128
# --- restore the trained checkpoint (no re-training: n_steps == source horizon) ---
- model.training.restore_from_run_id=updnet-ratio-100mice-20260703-200122-3dcb9217
# --- regenerate the update-rule / choice-rule figures ---
- model.training.plot_choice_rule=true
- model.training.plot_update_rules=true
# --- skip the auto held-out finetune for this cell (already have its held-out LL) ---
- model.training.auto_heldout_finetune.enabled=false
- ${args_no_hyphens}
parameters:
  model.penalties.update_net_latent_penalty_multiplier:
    values:
    - 2
  model.penalties.beta:
    values:
    - 3e-4
  model.training.lr:
    values:
    - 1e-3
  seed:
    values:
    - 1
