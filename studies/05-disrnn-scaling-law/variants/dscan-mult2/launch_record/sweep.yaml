# W&B sweep for 05-disrnn-scaling-law / dscan-mult2 — THE disRNN data-scaling curve.
# Consumed by launch_beaker_resumable.py: one autoResume Beaker task per (D × seed) = 15.
#
# QUESTION. Does held-out-mouse transfer improve with more training mice for the *disRNN*,
# and does its interaction bottleneck stay interpretable as D grows? This is the disRNN half
# of issue #16 ("Both architectures: GRU and DisRNN"): disRNN had only ever been trained at a
# fixed 100-mouse cohort (study 03), never on the full ~614-mouse dataset.
#
# DESIGN. Exactly study 03's `updnet-ratio-100mice` protocol at its recommended operating point
# (mult=2, moderate beta=1e-3, lr=1e-3), with the ONE change that D is now the swept axis. The
# D ladder, held-out cohort, snapshot and metric are those of the GRU curve (study 01), so the
# disRNN curve overlays the GRU curve directly:
#   * data.subject_ratio {0.016,0.049,0.163,0.489,1.0} -> D ~= {10,30,100,300,614}
#   * heldout_every_n=5 (fixed held-out cohort, never trained on, identical at every D)
#   * snapshot=20260603, ignore_policy=exclude (2-way), batch 2048 -> same trials as study 01
#   * y-axis heldout/eval_likelihood from the final auto_heldout_finetune (on by default)
# Cohorts are nested per seed (permutation-prefix sampling), and `seed` drives BOTH mouse
# selection and init, so seed-averaging captures sampling variability (study 01 README).
#
# WHY THIS OPERATING POINT (from study 03's verdict):
#   * mult=2 compresses the interaction bottleneck ~2.7x at no held-out cost while leaving
#     ~1 open channel to interpret (mult=5/10 collapse it to zero -> nothing left to read).
#   * beta=1e-3 (moderate) over 3e-4 (weak): held-out is flat between them, but 1e-3 gives a
#     tighter interaction bottleneck (openness 0.81 vs 1.16) at the same transfer.
#   * lr=1e-3, NOT 5e-3: both mult=10 NaN divergences in study 03 were at lr=5e-3.
#
# disRNN-trainer NOTES (do NOT copy the gru_scaling sweeps verbatim):
#   * NO early_stopping key — gru_trainer-only; Hydra errors on it for disRNN. Every run
#     therefore trains the full n_steps (~18 h at 60k, measured on the study-03 grid).
#   * n_warmup_steps is the disRNN *penalty* ramp (~5% of n_steps, Po-Chen convention).
#   * n_steps=60000 matches study 03 and is converged: on the 03 grid, checkpoint eval
#     likelihood is flat (+/-0.001) from ~40k to 67k. Session conditioning is fully on at 50k
#     (pretrain 30k + warmup 20k), leaving 10k full-SC steps — same as 03, so the D-comparison
#     is internally clean; see notes.md for the SC-window caveat vs the GRU's 100k.
entity: AIND-disRNN
project: disrnn_data_scaling
name: disrnn-dscan-mult2            # informational; launcher sets the real group
method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize
command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=disrnn
  - wandb.project=disrnn_data_scaling
  # --- cohort: D is the swept axis (below); 2-way output, comparable to study 01/03 ---
  - data.ignore_policy=exclude
  # --- architecture: linear choice net (Kevin) + disRNN defaults, identical to study 03 ---
  - model.architecture.choice_net_n_layers=0
  - model.architecture.latent_size=5
  - model.architecture.update_net_n_units_per_layer=16
  - model.architecture.update_net_n_layers=5
  # --- scalar session conditioning (lambda-forward): full SC at 50k ---
  - model.architecture.session_encoding_type=scalar
  - model.architecture.session_n_pretrain_steps=30000
  - model.architecture.session_n_warmup_steps=20000
  # --- operating point from study 03: mult=2 at moderate beta, safe lr ---
  - model.penalties.beta=1e-3
  - model.penalties.update_net_latent_penalty_multiplier=2
  - model.training.lr=1e-3
  # --- training budget: identical to study 03 (converged; resumable/extendable) ---
  - model.training.n_steps=60000
  - model.training.n_warmup_steps=7500
  - model.training.checkpoint_every_n_steps=10000
  - model.training.checkpoint_run_heldout_eval=false
  # --- length-bucketed batching: trim per-batch unroll to the batch's session length ---
  - model.training.length_bucketing=true
  - model.training.length_bucket_grid=128
  - ${args_no_hyphens}
parameters:
  data.subject_ratio:
    values: [0.016, 0.049, 0.163, 0.489, 1.0]   # D ~= 10, 30, 100, 300, 614
  seed:
    values: [0, 1, 2]
