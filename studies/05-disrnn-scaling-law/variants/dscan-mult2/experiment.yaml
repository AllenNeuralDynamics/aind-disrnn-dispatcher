# Task template for variant dscan-mult2 (consumed by launch_beaker_resumable.py).
# The launcher expands the sweep grid into one autoResume task per (D × seed) point = 15 tasks.
#
# COMPUTE: same small disRNN as study 03 (latent_size=5, update-net 16×5, LINEAR choice net) —
# nothing like the wide GRU H256 that needs H200's 141 GB. It fits comfortably on a 48 GB L40S at
# one 90GiB / 12-CPU bundle (= exactly 1 L40S GPU; safely under one H200 bundle too). Growing D
# from 100 to 614 grows the subject-embedding table (614 × 4 floats) and the host-side session
# cache, not the per-step GPU footprint (batch_size is fixed at 2048) — confirmed by smoke-d614
# before this fan-out is launched.
#
# WHY THREE CLUSTERS: not for speed — H200 is NOT inherently faster than L40S for our workloads
# (AGENTS §10) and this model needs none of its 141 GB. It is purely for CONCURRENCY: g6e alone
# has ~8 schedulable GPUs, so 15 tasks would drain in waves. Listing the two hub H200 pools
# alongside it (~47 more schedulable) lets the scheduler place all 15 at once, collapsing the
# fan-out to a single ~18 h wave at identical GPU-hours. GCP pools are deliberately excluded:
# they cannot reach the AWS S3 database.
#
# The launcher pins {priority: low, preemptible: true}, so these 15 tasks ride the ~unlimited
# low-preemptible tier (AGENTS §10 tier 3) and burst past the 8-slot unallocated cap; eviction is
# recovered by autoResume + the trainer's full-state checkpoint (checkpoint_every_n_steps=10000).
#
# Runtime refs stay readable as `main`; the launcher resolves them to immutable SHAs before
# submission. The entrypoint checks out those SHAs at container startup (no rebuild for code changes).
version: v2
description: >
  disRNN data-scaling curve — 15-task grid over D (subject_ratio) × seed at the study-03
  operating point (mult=2, beta=1e-3, lr=1e-3), 2-way output, fixed held-out cohort.
tasks:
  - name: disrnn-dscan-mult2-template
    image:
      beaker: han-hou/disrnn-wrapper-main-20260712
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo.ai-aws-g6e
        - ai1/octo-hub-aws-h200
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 12
      memory: 90GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: DISPATCHER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: FORAGING_MODELS_REF
        value: main  # readable source ref; launcher submits the resolved SHA
    result:
      path: /results
