# W&B sweep for 05-disrnn-scaling-law / smoke-d614 — 1-task plumbing check at the FULL cohort.
# Consumed by launch_beaker_resumable.py: expands to a single autoResume Beaker task.
#
# WHY. disRNN has never been trained on the full ~614-mouse cohort (only D=100 in study 03).
# Before committing the 15-task dscan-mult2 fan-out (~270 GPU-h), prove at D=614 that:
#   1. the loader selects/fetches all ~614 subjects and the 614-row subject-embedding table
#      builds (D=100 is the largest disRNN cohort ever run);
#   2. it fits one 48 GB L40S bundle (90GiB / 12 CPU / 1 GPU) — no OOM, no multi-GPU grab;
#   3. the whole schedule executes end-to-end: penalty warmup -> SC pretrain -> SC warmup ->
#      full SC -> checkpoint -> auto_heldout_finetune -> heldout/eval_likelihood logged;
#   4. it does not NaN, and we get a real s/step at D=614 to firm up the fan-out estimate.
#
# HOW. Identical to dscan-mult2 (mult=2, beta=1e-3, lr=1e-3, D=1.0) except the schedule is
# COMPRESSED ~30x so the same code paths run in ~1 h instead of ~18 h: penalty warmup 250,
# SC pretrain 1000 + warmup 500 (full SC at 1500), n_steps 2000, checkpoint every 1000.
# The numbers from this run are NOT science — the model is nowhere near converged. It is a
# pipeline test only; nothing from it feeds a report.
entity: AIND-disRNN
project: disrnn_data_scaling
name: disrnn-smoke-d614             # informational; launcher sets the real group
method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize
command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=disrnn
  - wandb.project=disrnn_data_scaling
  # --- FULL cohort: the thing being smoke-tested ---
  - data.subject_ratio=1.0
  - data.ignore_policy=exclude
  # --- architecture: identical to dscan-mult2 ---
  - model.architecture.choice_net_n_layers=0
  - model.architecture.latent_size=5
  - model.architecture.update_net_n_units_per_layer=16
  - model.architecture.update_net_n_layers=5
  # --- scalar session conditioning, COMPRESSED: full SC at 1500 (vs 50000) ---
  - model.architecture.session_encoding_type=scalar
  - model.architecture.session_n_pretrain_steps=1000
  - model.architecture.session_n_warmup_steps=500
  # --- operating point: identical to dscan-mult2 ---
  - model.penalties.beta=1e-3
  - model.penalties.update_net_latent_penalty_multiplier=2
  - model.training.lr=1e-3
  # --- COMPRESSED budget: pipeline test, not science ---
  - model.training.n_steps=2000
  - model.training.n_warmup_steps=250
  - model.training.checkpoint_every_n_steps=1000
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  - model.training.length_bucket_grid=128
  - ${args_no_hyphens}
parameters:
  seed:
    values: [0]
