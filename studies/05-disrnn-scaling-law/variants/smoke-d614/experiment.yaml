# Task template for variant smoke-d614 (consumed by launch_beaker_resumable.py).
# The sweep has a single grid point, so this expands to exactly ONE autoResume task.
#
# COMPUTE: deliberately the SAME bundle and the SAME cluster list the fan-out will use — one
# 90GiB / 12-CPU / 1-GPU bundle across g6e + the two hub H200 pools. That is the point: this run
# exists to prove the full ~614-mouse cohort fits this bundle (no OOM, no silent multi-GPU grab)
# before 27 tasks are committed to it. Verify on the scheduled job that
# BEAKER_ASSIGNED_GPU_COUNT == 1 (beaker-launch skill, GPU-bundle sizing).
#
# Runtime refs stay readable as `main`; the launcher resolves them to immutable SHAs before
# submission — so the SHAs this smoke validates are the SHAs the fan-out will run.
version: v2
description: >
  disRNN scaling-law smoke — 1 task, full ~614-mouse cohort, compressed schedule (~1 h):
  proves loader/embedding/memory/schedule/heldout-finetune all work at D=614 before the fan-out.
tasks:
  - name: disrnn-smoke-d614-template
    image:
      beaker: han-hou/disrnn-wrapper-main-20260712
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo.ai-aws-g6e
        - ai1/octo-hub-aws-h200
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 12
      memory: 90GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: DISPATCHER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: FORAGING_MODELS_REF
        value: main  # readable source ref; launcher submits the resolved SHA
    result:
      path: /results
