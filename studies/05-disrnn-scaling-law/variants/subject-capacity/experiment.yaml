# Task template for variant subject-capacity (consumed by launch_beaker_resumable.py).
# The launcher expands the sweep into one autoResume task per
# (subject_embedding_size × subject_penalty × seed) point = 18 tasks.
#
# REQUIRES the coupled subject penalties from dispatcher PR #62 (merged as 98343d9). Without that
# coupling, update_net_subject_penalty and choice_net_subject_penalty stay clamped at beta, the
# subject embedding stays bottlenecked DOWNSTREAM of the knob this sweep turns, and the whole grid
# returns a FALSE NEGATIVE. DISPATCHER_REF=main is therefore only valid at/after 98343d9; the
# launcher resolves it to a full 40-char SHA before submitting (AGENTS §10).
#
# COMPUTE: same small disRNN as dscan-mult2 (latent 5, update-net 16×5, linear choice net). The
# only thing this grid grows is the SUBJECT EMBEDDING (4 -> 64 dims = a 100 × 64 float table at
# D=100) -- negligible. Fits one 48 GB L40S bundle (90GiB / 12 CPU / 1 GPU). Three clusters listed
# for concurrency, not speed (H200 is not faster for our workloads and this model needs none of its
# 141 GB); GCP pools excluded -- they cannot reach the AWS S3 database.
version: v2
description: >
  disRNN subject-capacity grid at D=100 — 18 tasks over subject_embedding_size {4,16,64} ×
  subject_penalty {beta, beta/10, 0} × seed {0,1}. Tests whether per-subject capacity, not the
  interaction bottleneck, is what caps held-out transfer. subject_penalty=0 is the GRU limit.
tasks:
  - name: disrnn-subject-capacity-template
    image:
      beaker: han-hou/disrnn-wrapper-main-20260712
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo.ai-aws-g6e
        - ai1/octo-hub-aws-h200
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 12
      memory: 90GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: main  # readable source ref; launcher submits the resolved SHA (includes wrapper #56)
      - name: DISPATCHER_REF
        value: main  # readable source ref; launcher submits the resolved SHA (needs >= 98343d9, PR #62)
      - name: FORAGING_MODELS_REF
        value: main  # readable source ref; launcher submits the resolved SHA
    result:
      path: /results
