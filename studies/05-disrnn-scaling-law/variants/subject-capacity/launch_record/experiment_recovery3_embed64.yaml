version: v2
description: '05-disrnn-scaling-law / subject-capacity: 3rd (clean) recovery of the 6 embed=64 cells.
  Recovery #2 fixed the crash (wrapper #61) but reused the dead runs'' WANDB_RUN_IDs with WANDB_RESUME=allow
  -- W&B''s step counter was still at 17,502, so the restarted-from-scratch runs had every metric below
  that step silently discarded. Fresh WANDB_RUN_IDs here; same group, same SHAs, same grid.'
tasks:
- name: subject-capacity-20260713-225831-012
  image:
    beaker: han-hou/disrnn-wrapper-main-20260712
  command:
  - bash
  - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=disrnn
  - wandb.project=disrnn_data_scaling
  - data.subject_ratio=0.163
  - data.ignore_policy=exclude
  - model.architecture.choice_net_n_layers=0
  - model.architecture.latent_size=5
  - model.architecture.update_net_n_units_per_layer=16
  - model.architecture.update_net_n_layers=5
  - model.architecture.session_encoding_type=scalar
  - model.architecture.session_n_pretrain_steps=30000
  - model.architecture.session_n_warmup_steps=20000
  - model.penalties.beta=1e-3
  - model.penalties.update_net_latent_penalty_multiplier=2
  - model.training.lr=1e-3
  - model.training.n_steps=60000
  - model.training.n_warmup_steps=7500
  - model.training.checkpoint_every_n_steps=10000
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  - model.training.length_bucket_grid=128
  - model.architecture.subject_embedding_size=64
  - model.penalties.subject_penalty=1e-3
  - seed=0
  constraints:
    cluster:
    - ai1/octo.ai-aws-g6e
    - ai1/octo-hub-aws-h200
