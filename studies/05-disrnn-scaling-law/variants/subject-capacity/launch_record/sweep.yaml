# W&B sweep for 05-disrnn-scaling-law / subject-capacity.
# Consumed by launch_beaker_resumable.py: one autoResume Beaker task per
# (subject_embedding_size × subject_penalty × seed) = 3 × 3 × 2 = 18 tasks.
#
# QUESTION. Is PER-SUBJECT CAPACITY -- not the interaction bottleneck -- what caps the disRNN's
# held-out transfer?
#
# WHY WE THINK SO. Two findings from this study's dscan-mult2 arm, at fixed mult=2 / beta=1e-3:
#
#   D                          10      30     100     300
#   update<-subject openness  0.850   0.984   0.780   0.640    <- per-subject channel CLOSES with D
#   choice<-subject openness  0.002   0.001   0.001   0.001    <- choice net NEVER uses subject id
#   update<-latent (interact) 0.161   0.481   0.774   0.922    <- shared dynamics OPEN with D
#   heldout LL                0.7101  0.7147  0.7174  0.7165   <- saturates by ~100 mice
#
# So as mice accumulate the model moves capacity OUT of per-subject channels and INTO shared
# dynamics: it abandons personalisation and learns a population-average mechanism. At D=300 it is
# personalising through LESS THAN ONE effective open subject dimension. Meanwhile the disRNN sits
# ~0.010 below the GRU at EVERY D (a flat gap: -0.0118/-0.0102/-0.0088/-0.0103) and is only at
# parity with a per-mouse classical RL baseline (compare-to-threshold, 0.7170) -- while the GRU
# beats that baseline by +0.0098. The GRU's subject embedding carries NO bottleneck. Hypothesis:
# the subject bottleneck is the disRNN's transfer deficit.
#
# DESIGN. Two coupled axes, because either alone is uninterpretable:
#   * subject_embedding_size {4, 16, 64} -- study 04: "embedding dimension, not network width, is
#     the identifiability knob". 4 is the current default.
#   * subject_penalty {beta, beta/10, 0} -- widening the embedding ALONE would fail: the penalty
#     would simply close the extra dims and we would learn nothing. subject_penalty=0 is the GRU
#     LIMIT of the subject pathway (unbottlenecked embedding, everything else disRNN), which makes
#     this a causal test: if the -0.010 gap closes at penalty=0, the bottleneck IS the cause.
#     REQUIRES dispatcher PR #62 (cdc6b95): it couples update_net_subject_penalty and
#     choice_net_subject_penalty to subject_penalty. Without that they stay clamped at beta, the
#     embedding stays bottlenecked DOWNSTREAM, and this sweep returns a FALSE NEGATIVE.
#
# WHY D=100 (not 614). The disRNN-vs-GRU gap is FLAT in D, so the deficit is fully present at
# D=100 -- there is no need to pay for D=614 to study it. D=100 is also where the comparison data
# lives: study 03's entire 48-run mult x beta grid, the GRU's D=100 cells, and this study's own
# dscan-mult2 D=100 cells. Cheaper too (checkpoint eval ~10 min at D=100 vs ~50 min at D=614).
#
# BUILT-IN CONTROL. The (embed=4, subject_penalty=beta) corner is config-identical to
# dscan-mult2's D=100 cells -- but those ran on the PRE-merge wrapper, and this launch resolves
# WRAPPER_REF to a SHA that INCLUDES the checkpoint perf fix (aind-disrnn-wrapper#56). That fix is
# claimed to be numerically inert (it only changes what gets built for plotting). These 2 runs
# TEST that claim: they must reproduce the old D=100 held-out LL (0.7188 / 0.7162 at seeds 0/1).
# Not redundancy -- the only validation of a merged change every future comparison depends on.
entity: AIND-disRNN
project: disrnn_data_scaling
name: disrnn-subject-capacity      # informational; launcher sets the real group
method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize
command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=disrnn
  - wandb.project=disrnn_data_scaling
  # --- cohort: D=100, matching dscan-mult2's D=100 cells and study 03's whole grid ---
  - data.subject_ratio=0.163
  - data.ignore_policy=exclude
  # --- architecture: identical to dscan-mult2 EXCEPT subject_embedding_size (swept below) ---
  - model.architecture.choice_net_n_layers=0
  - model.architecture.latent_size=5
  - model.architecture.update_net_n_units_per_layer=16
  - model.architecture.update_net_n_layers=5
  # --- scalar session conditioning: identical to dscan-mult2 ---
  - model.architecture.session_encoding_type=scalar
  - model.architecture.session_n_pretrain_steps=30000
  - model.architecture.session_n_warmup_steps=20000
  # --- operating point: identical to dscan-mult2 (mult=2, beta=1e-3, lr=1e-3) ---
  - model.penalties.beta=1e-3
  - model.penalties.update_net_latent_penalty_multiplier=2
  - model.training.lr=1e-3
  # --- training budget: identical to dscan-mult2 ---
  - model.training.n_steps=60000
  - model.training.n_warmup_steps=7500
  - model.training.checkpoint_every_n_steps=10000
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  - model.training.length_bucket_grid=128
  - ${args_no_hyphens}
parameters:
  model.architecture.subject_embedding_size:
    values: [4, 16, 64]
  model.penalties.subject_penalty:
    values: [1e-3, 1e-4, 0]     # beta, beta/10, 0 (= GRU limit of the subject pathway)
  seed:
    values: [0, 1]
