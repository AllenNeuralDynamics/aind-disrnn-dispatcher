# W&B sweep for 05-disrnn-scaling-law / mult-beta-d614 — does study 03's verdict survive at D=614?
# Consumed by launch_beaker_resumable.py: one autoResume Beaker task per (mult × beta) = 12.
#
# QUESTION (issue #16, need 3). Study 03 established the multiplier/beta conclusions at a fixed
# D=100 cohort: the multiplier monotonically closes the interaction (update<-latent) bottleneck,
# the model compensates by opening other gates, and held-out transfer is flat across the
# multiplier. Those conclusions are what we lean on to pick mult=2 for the scaling curve — but
# the *original motivating worry* (study 03's opening line) is that the interaction bottleneck
# fails to sparsify precisely WHEN MANY MICE ARE TRAINED TOGETHER. D=100 may simply be too few
# mice for that failure to bite. So before trusting the interpretability read-out at scale, we
# re-run 03's grid at the FULL cohort and check the same three claims hold.
#
# DESIGN. Study 03's grid, at D=614 instead of D=100, with the two axes that matter kept and the
# two nuisance axes dropped:
#   * KEPT:    multiplier {1,2,5,10} x base beta {3e-4, 1e-3, 3e-3}   = 12 cells
#   * DROPPED: lr {1e-3,5e-3} -> pinned 1e-3 (both study-03 NaN divergences were at lr=5e-3)
#              seed {0,1}     -> NOT swept, so every cell runs at Hydra's default seed=42. That is
#                                an INDEPENDENT 4th seed vs dscan-mult2's D=614 cells (seeds 0/1/2),
#                                not a duplicate of seed 0. Single-seed on purpose: this is a
#                                mechanism check, not an effect-size estimate.
# Everything else is byte-identical to study 03 so the two grids are directly comparable
# cell-by-cell: same architecture, same SC schedule, same n_steps=60000, same snapshot, same
# 2-way output. The comparison is D=100 (study 03) vs D=614 (here), one axis moved.
#
# WATCH. mult=10 was NaN-prone in study 03 (deterministically at lr=5e-3, seed=0). We avoid that
# lr, but if a mult=10 cell still diverges at D=614 that is itself a reportable result — do not
# silently retry it into existence.
#
# Effective multiplier is recovered post-hoc as round(update_net_latent_penalty / beta): the
# dispatcher consumes and drops the multiplier field before training.
entity: AIND-disRNN
project: disrnn_data_scaling
name: disrnn-mult-beta-d614         # informational; launcher sets the real group
method: grid
metric:
  name: final/bottlenecks/update_net_latent_frac_open
  goal: minimize        # sparser interaction bottleneck = fewer open update-net latents
command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=disrnn
  - wandb.project=disrnn_data_scaling
  # --- FULL cohort: the one axis moved vs study 03 (which was subject_ratio=0.163, D=100) ---
  - data.subject_ratio=1.0
  - data.ignore_policy=exclude
  # --- architecture: identical to study 03 ---
  - model.architecture.choice_net_n_layers=0
  - model.architecture.latent_size=5
  - model.architecture.update_net_n_units_per_layer=16
  - model.architecture.update_net_n_layers=5
  # --- scalar session conditioning: identical to study 03 ---
  - model.architecture.session_encoding_type=scalar
  - model.architecture.session_n_pretrain_steps=30000
  - model.architecture.session_n_warmup_steps=20000
  # --- lr pinned to the non-divergent value (study 03: both NaNs were at 5e-3) ---
  - model.training.lr=1e-3
  # --- training budget: identical to study 03 ---
  - model.training.n_steps=60000
  - model.training.n_warmup_steps=7500
  - model.training.checkpoint_every_n_steps=10000
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  - model.training.length_bucket_grid=128
  - ${args_no_hyphens}
parameters:
  model.penalties.update_net_latent_penalty_multiplier:
    values: [1, 2, 5, 10]
  model.penalties.beta:
    values: [3e-4, 1e-3, 3e-3]
