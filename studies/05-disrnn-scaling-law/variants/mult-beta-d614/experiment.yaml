# Task template for variant mult-beta-d614 (consumed by launch_beaker_resumable.py).
# The launcher expands the sweep grid into one autoResume task per (multiplier × beta) = 12 tasks.
#
# COMPUTE: identical bundle to study 03's updnet-ratio-100mice (one 90GiB / 12-CPU GPU bundle) —
# same small disRNN, same batch size; only the cohort grew (D=100 -> 614), which costs host-side
# session cache, not per-step GPU memory. smoke-d614 re-confirms the fit at the full cohort first.
#
# WHY THREE CLUSTERS: concurrency, not speed — see dscan-mult2/experiment.yaml. The model needs
# none of the H200's 141 GB; the hub H200 pools are listed only so all 12 tasks can be placed at
# once instead of draining in waves on g6e's ~8 schedulable GPUs. GCP pools excluded (no S3).
#
# Runtime refs stay readable as `main`; the launcher resolves them to immutable SHAs before
# submission. The entrypoint checks out those SHAs at container startup.
version: v2
description: >
  disRNN mult×beta grid at the FULL cohort — 12-task replication of study 03's D=100 grid at
  D=614, to check the sparsity/transfer conclusions survive at scale.
tasks:
  - name: disrnn-mult-beta-d614-template
    image:
      beaker: han-hou/disrnn-wrapper-main-20260712
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo.ai-aws-g6e
        - ai1/octo-hub-aws-h200
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 12
      memory: 90GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: DISPATCHER_REF
        value: main  # readable source ref; launcher submits the resolved SHA
      - name: FORAGING_MODELS_REF
        value: main  # readable source ref; launcher submits the resolved SHA
    result:
      path: /results
