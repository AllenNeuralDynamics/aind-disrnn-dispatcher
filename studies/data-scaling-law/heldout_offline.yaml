# Offline held-out fine-tune+test config (the study y-axis), reusable across all runs.
# Each offline job mounts ONE training run's result dataset at /prior, so model_dir is
# constant. Matches the inline auto_heldout_finetune params (n_steps=500, lr=1e-3) so
# offline numbers are comparable. Held-out subject set is inherited from the source
# run's inputs.yaml (every-5th-ranked reserved cohort, ~153 mice) — same for every run.
source_run:
  model_dir: /prior/run
  checkpoint_policy: best_eval

heldout_subjects:
  test_subject_ids: null     # inherit the reserved held-out set from the source run
  curricula: null
  min_sessions: null
  heldout_every_n: null
  mature_only: null
  cols_to_retain: null

heldout_finetuning:
  n_steps: 500
  lr: 1e-3
  checkpoint_every_n_steps: 100
  batch_size: null
  batch_mode: single
  example_max_subjects: 1
  skip_subjects_with_insufficient_sessions: true
  keep_media_files: false

output:
  output_root: /results/heldout
  run_name_suffix: null

wandb: {}
seed: 0
