version: v2
description: "mice-data-scaling-gru \u2014 15 resumable grid tasks (autoResume)"
tasks:
- name: mice-data-scaling-gru-000
  image:
    beaker: han-hou/disrnn-wrapper-pck-integration
  command:
  - bash
  - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=gru_scaling
  - wandb.project=mice_data_scaling
  - model.architecture.hidden_size=128
  - model.architecture.session_encoding_type=scalar
  - model.training.n_steps=300000
  - model.training.lr=1e-5
  - model.training.checkpoint_run_heldout_eval=false
  - data.subject_ratio=0.016
  - seed=0
  constraints:
    cluster:
    - ai1/octo-hub-onprem-h200
  resources:
    gpuCount: 1
    cpuCount: 16
    memory: 256GiB
  envVars:
  - name: WANDB_API_KEY
    secret: han-wandb-api-key
  - name: WRAPPER_REF
    value: b0c7f11a5497620416349e023df95c5a39516221
  - name: DISPATCHER_REF
    value: study/data-scaling-law
  - name: DISRNN_RESUMABLE_OUTPUT_DIR
    value: /results/run
  - name: WANDB_RUN_ID
    value: mice-data-scaling-gru-d0a4b0e7
  - name: WANDB_RESUME
    value: allow
  - name: WANDB_RUN_GROUP
    value: mice-data-scaling-gru
  result:
    path: /results
  context:
    priority: low
    preemptible: true
