# DRAFT — variant v2-postwarmup. Re-run of the data-scaling sweep so that session
# conditioning actually engages (v1 early-stopped at ~40k, inside pretrain).
#
# OPEN DECISION (finalize before launch): how to avoid stopping before warm-up ends
# (warm-up spans 90k→150k). Two options —
#   (a) disable early stopping, train to n_steps=300k (chosen below; simplest, no code
#       change, but ~20–30h/run);
#   (b) add a `start_after_step` knob to the wrapper's early-stopping so it only begins
#       checking after ≥150k (keeps the compute-saver but needs a wrapper change).
# Distinct W&B group (`name` below) so it sits beside v1 in the same project for
# comparison.

entity: AIND-disRNN
project: mice_data_scaling
name: mice-data-scaling-v2-postwarmup          # -> W&B group for this variant

method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=gru_scaling
  - wandb.project=mice_data_scaling
  - model.architecture.hidden_size=128
  - model.architecture.session_encoding_type=scalar
  - model.training.n_steps=300000
  - model.training.lr=1e-5
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  # v2 change: train THROUGH warm-up (90k→150k) so session conditioning engages.
  # Option (a): early stopping OFF → trains to n_steps. Switch to a post-warmup-gated
  # early stop once option (b)'s wrapper knob exists.
  - model.training.early_stopping.enabled=false
  - ${args_no_hyphens}

parameters:
  data.subject_ratio:
    values: [0.016, 0.049, 0.163, 0.489, 1.0]
  seed:
    values: [0, 1, 2]
