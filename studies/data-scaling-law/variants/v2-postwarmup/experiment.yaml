# DRAFT — task template for variant v2-postwarmup (consumed by launch_beaker_resumable.py).
# Differences from v1: uses the wandb retry→offline-fallback safeguard (WRAPPER_REF=6ede321)
# and runs ONLINE (no WANDB_MODE=offline) — the v1 wandb-init failures were a TRANSIENT
# cluster→W&B outage (14 concurrent inits later confirmed fine), and 6ede321 auto-falls-back
# to offline if init flakes again. So expect live W&B; if it falls back, sync per the root
# README "Syncing the offline W&B runs".
version: v2
description: data-scaling v2-postwarmup template (one autoResume task per grid point)
tasks:
  - name: data-scaling-v2-template
    image:
      beaker: han-hou/disrnn-wrapper-pck-integration
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
    constraints:
      cluster:
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 16
      memory: 256GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: 6ede321d5cedf944ea2b1233d89c2d0f95c3459a   # retry→offline-fallback safeguard
      - name: DISPATCHER_REF
        value: study/data-scaling-law
      # (online by default; safeguard auto-falls-back to offline on a flaky init)
    result:
      path: /results
