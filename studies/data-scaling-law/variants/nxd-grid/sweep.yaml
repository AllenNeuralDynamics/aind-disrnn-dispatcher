# Variant nxd-grid — N×D joint-scaling grid for held-out generalization.
#
# Question: does model capacity (N = hidden_size) interact with training-data breadth
# (D = #mice) for held-out-mouse generalization? We ALREADY have H128 × all D from
# variant v2-sc-active, so this variant runs ONLY the OTHER hidden sizes and the grid is
# combined with v2-sc-active's H128 column in analysis.
#
# Grid: hidden_size ∈ {16, 64, 256} × subject_ratio ∈ {0.016, 0.163, 1.0} (D≈10/100/614)
#        × seed ∈ {0, 1, 2} = 27 tasks.
#
# ALL other knobs identical to v2-sc-active (scalar SC, lambda forward: full SC @50k,
# n_steps=150k, lr=1e-5, gated early stop @70k, length bucketing, per-checkpoint heldout
# eval OFF). Distinct W&B group (launcher sets nxd-grid@<launch_id>) so it sits beside
# v2-sc-active (the H128 column) in the same project for the joint N×D view.

entity: AIND-disRNN
project: mice_data_scaling
name: mice-data-scaling-nxd-grid          # informational; launcher sets the real group

method: grid
metric:
  name: heldout/eval_likelihood
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=mice_snapshot_scaling
  - model=gru_scaling
  - wandb.project=mice_data_scaling
  - model.architecture.session_encoding_type=scalar
  # lambda forward: pretrain 30k, warmup 30k->50k => full session conditioning at 50k.
  - model.architecture.session_n_pretrain_steps=30000
  - model.architecture.session_n_warmup_steps=20000
  - model.training.n_steps=150000
  - model.training.lr=1e-5
  - model.training.checkpoint_run_heldout_eval=false
  - model.training.length_bucketing=true
  # gated early stop: only arms at >=70k (20k after full lambda); catches post-SC overfit.
  - model.training.early_stopping.enabled=true
  - model.training.early_stopping.start_after_step=70000
  - ${args_no_hyphens}

parameters:
  model.architecture.hidden_size:
    values: [16, 64, 256]
  data.subject_ratio:
    values: [0.016, 0.163, 1.0]
  seed:
    values: [0, 1, 2]
