# Task TEMPLATE for the data-scaling study, consumed by launch_beaker_resumable.py.
# The launcher keeps command[:2] (bash + entrypoint.sh), drops the wandb-agent tail,
# appends the per-grid-point `run_hpc` command, forces context to
# {priority: low, preemptible: true} (so Beaker applies autoResume), and injects
# DISRNN_RESUMABLE_OUTPUT_DIR / WANDB_RUN_ID / WANDB_RESUME / WANDB_RUN_GROUP.
version: v2
description: data-scaling study template (expanded into one autoResume task per grid point)
tasks:
  - name: data-scaling-template
    image:
      beaker: han-hou/disrnn-wrapper-pck-integration
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb            # dropped by the resumable launcher (command[:2] kept)
      - agent
    constraints:
      cluster:
        # onprem-H200: many slots (uses the full 8 preemptible + 4 allocated quota),
        # 141 GB GPU, ~3.25 TiB node RAM. Its W&B path had a transient blip
        # (07:49-08:00) but recovered (probes WANDB_OK ~1.5s); L40s was the cluster
        # that couldn't reach W&B (and only has 4 physical slots).
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1
      cpuCount: 16
      memory: 256GiB
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: WRAPPER_REF
        value: bdb326d5f0132f7a9c5ab5bd108634ce5d3b6d17
      - name: DISPATCHER_REF
        value: study/data-scaling-law
      # W&B run-creation throttles under a concurrent-init burst: on onprem-H200 a
      # single wandb.init succeeds in ~1.5s but 14 simultaneous ones all time out.
      # Offline init is local, so it's immune — runs write to /results/wandb and are
      # `wandb sync`'d later. (L40s additionally can't reach W&B even solo.)
      - name: WANDB_MODE
        value: offline
    result:
      path: /results
