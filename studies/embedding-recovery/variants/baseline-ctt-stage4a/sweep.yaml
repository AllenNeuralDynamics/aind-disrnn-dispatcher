# embedding-recovery / baseline-ctt-stage4a — FIXED ctt fitter on Stage-4a family-mixture data.
# One of THREE FIXED baselines (Bari/CTT/LossCounting). Fits a SINGLE model type (ctt) to
# ALL 200 subjects on the SAME Stage-4a data + SAME tail held-out split as gru-stage4a.
# Model-selection over the three recovers each subject's FAMILY (confusion vs generator).
entity: AIND-disRNN
project: embedding_recovery
name: baseline-ctt-stage4a

method: grid
metric:
  name: likelihood_relative_to_groundtruth
  goal: maximize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic_hierarchical
  - data/agent=hierarchical_rl_stage4a
  - model=baseline_rl_ctt
  - data.num_subjects=200
  - data.num_sessions_per_subject=40
  - data.num_trials=650
  - data.eval_every_n=2
  - data.heldout_session_mode=tail
  - data.heldout_frac=0.2
  - data/task=random_walk
  - data.task.reward_baiting=false
  - "wandb.tags=[embedding-recovery,stage4a,baseline_rl,ctt,reference]"
  - ${args_no_hyphens}

parameters:
  seed:
    values: [42]
