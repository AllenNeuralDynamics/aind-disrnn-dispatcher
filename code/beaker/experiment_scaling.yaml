## Beaker experiment spec — disRNN scaling test (array of W&B sweep agents).
##
## N replicas, each on its own GPU, all draining the SAME sweep queue — the
## "across many GPUs" parallelism. The W&B sweep shards naturally: each agent
## pulls combos until the grid is exhausted, then exits.
##
## Launch (the launcher renders <SWEEP_ID>):
##   python code/launch_beaker.py \
##     --sweep code/beaker/sweep_scaling.yaml \
##     --experiment code/beaker/experiment_scaling.yaml

version: v2
description: disRNN scaling — N wandb-agent replicas sharing one sweep
tasks:
  - name: disrnn-scaling
    image:
      beaker: han-hou/disrnn-wrapper-main-20260712
    # No --count: each agent drains the sweep queue until the grid is
    # exhausted, then exits. With replicas=4 and 8 combos that's ~2 runs/GPU.
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
      - "<SWEEP_ID>"
    replicas: 4                    # 4 agents drain the 8-combo grid (~2 runs each)
    context:
      priority: high
      preemptible: false
    constraints:
      cluster:
        # onprem-H200 (141GB GPU, ~3.25TiB RAM, reaches AWS S3) runs every combo
        # incl. wide H256 with headroom. L40s also works now (eval chunking) but
        # its 48GB GPU / 373GiB node is tight — see beaker/README "Memory pitfalls".
        - ai1/octo-hub-onprem-h200
    resources:
      gpuCount: 1                  # per replica
      memory: 256GiB               # generous on the ~3.25TiB onprem-H200 nodes
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: DISRNN_OUTPUT_DIR
        value: /results
      - name: WRAPPER_REF
        # full SHA required: entrypoint does `git fetch origin <ref>`, which
        # rejects short SHAs. 57dcd3a = session-reg fix + gru-eval defrag +
        # per-subject split-example build + load groupby + eval GPU chunking.
        value: 57dcd3a0ba68b2093a02078a3d83e4d12b2facf2
      - name: DISPATCHER_REF
        value: main
      - name: FORAGING_MODELS_REF
        value: b44b0912de8d5307debe9b3b1c570cfc6dad816e
    result:
      path: /results
