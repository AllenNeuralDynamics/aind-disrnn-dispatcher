# L40s vs CO-T4 apples-to-apples sweep — EXACT config of the T4 benchmark run
# (AIND-disRNN/han_cpu_gpu_test/g9jibgqd): a single full-length run so per-run
# wall-clock and s/step are directly comparable to the T4 number (~0.46 s/step).
#
# 1 combo (seed=0) so it's one run; launch via experiment_mvp.yaml:
#   python code/launch_beaker.py \
#     --sweep code/beaker/sweep_t4match.yaml \
#     --experiment code/beaker/experiment_mvp.yaml

entity: AIND-disRNN
project: ai_hub_test
name: t4match-bs512-wu500-5000

method: grid
metric:
  name: final/val_loss
  goal: minimize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic
  - model=disrnn
  - data.batch_size=512
  - data.num_sessions=100
  - data.eval_every_n=2
  - model.training.n_steps=5000
  - model.training.n_warmup_steps=500
  - model.training.lr=0.005
  - model.penalties.beta=0.001
  - "wandb.tags=[beaker,t4match]"
  - ${args_no_hyphens}

parameters:
  seed:
    values: [0]
