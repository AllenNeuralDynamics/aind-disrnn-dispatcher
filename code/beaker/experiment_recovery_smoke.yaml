## Beaker spec — embedding-recovery SMOKE on one gcp-h100 GPU.
## Validates the hierarchical-synthetic -> multisubject-GRU -> recovery path.
## The entrypoint refreshes all three source repos to the refs below at container
## startup, so code/config changes need no image rebuild.
## The launcher renders <SWEEP_ID> at submit.
##
## Launch (from hpc-code login node, dispatcher repo root):
##   wandb sweep code/hpc/sweeps/embedding_recovery_smoke.yaml
##   # paste SWEEP_ID below, then:
##   beaker experiment create -w ai1/aind-dynamic-foraging-foundation-model \
##     code/beaker/experiment_recovery_smoke.yaml

version: v2
description: embedding-recovery smoke (hierarchical synthetic + multisubject GRU) on one gcp-h100
tasks:
  - name: recovery-smoke-gru
    image:
      beaker: han-hou/disrnn-wrapper-main-20260712
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
      - --count
      - "1"
      - "<SWEEP_ID>"
    context:
      priority: normal
      preemptible: false
    constraints:
      cluster:
        - ai1/octo-hub-gcp-h100
    resources:
      gpuCount: 1
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: DISRNN_OUTPUT_DIR
        value: /results
      - name: WRAPPER_REF
        value: main
      - name: DISPATCHER_REF
        value: main
      - name: FORAGING_MODELS_REF
        value: main
    result:
      path: /results
