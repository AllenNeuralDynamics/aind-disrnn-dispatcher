## Beaker experiment spec — disRNN MVP (one W&B sweep agent on one GPU).
##
## Dispatcher control-plane artifact: the Beaker job the dispatcher launches. The
## image is built/maintained in the wrapper repo (aind-disrnn-wrapper/beaker) and
## clones both repos at runtime, so this spec never needs the image rebuilt for
## code changes.
##
## Fill before submitting:
##   <SWEEP_ID>   e.g. AIND-disRNN/beaker_mvp/abc123  (from `wandb sweep code/beaker/sweep_mvp.yaml`)
##
## Submit:
##   beaker experiment create -w ai1/aind-dynamic-foraging-foundation-model code/beaker/experiment_mvp.yaml

version: v2
description: disRNN MVP — synthetic-RL -> disRNN (default), one W&B sweep agent
tasks:
  - name: disrnn-mvp
    image:
      beaker: han-hou/disrnn-wrapper        # from `beaker image get disrnn-wrapper`
    # entrypoint.sh pulls the latest code from GitHub at container startup, THEN
    # runs `wandb agent`. Control the code version via WRAPPER_REF/DISPATCHER_REF.
    command: [bash, /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh, wandb, agent, --count, "1", "<SWEEP_ID>"]
    replicas: 1
    context:
      priority: low
      preemptible: true
    constraints:
      cluster:
        - ai1/octo-hub-aws-l40s      # smallest GPU class (L40s)
    resources:
      gpuCount: 1
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key      # Beaker secret holding your W&B key
      - name: DISRNN_OUTPUT_DIR
        value: /results
      - name: WRAPPER_REF              # branch/tag/SHA to run; SHA pins for reproducibility
        value: ai_hub
      - name: DISPATCHER_REF
        value: ai_hub
    result:
      path: /results
