# Eval-frequency test — does evaluating less often give a big speedup?
#
# Same config as the T4-match benchmark but SHORT (n_steps=1000), sweeping
# data.eval_every_n over [2, 10, 50, 500]. 4 grid points -> run as replicas: 4
# (one eval-value per GPU). Compare train s/step across the four.
#
#   python code/launch_beaker.py \
#     --sweep code/beaker/sweep_eval.yaml \
#     --experiment code/beaker/experiment_scaling.yaml

entity: AIND-disRNN
project: ai_hub_test
name: eval-freq-disrnn

method: grid
metric:
  name: final/val_loss
  goal: minimize

command:
  - python
  - -m
  - run_hpc
  - data=synthetic
  - model=disrnn
  - data.batch_size=512
  - data.num_sessions=100
  - model.training.n_steps=1000
  - model.training.n_warmup_steps=100
  - model.training.lr=0.005
  - model.penalties.beta=0.001
  - "wandb.tags=[beaker,evalfreq]"
  - ${args_no_hyphens}

parameters:
  data.eval_every_n:
    values: [2, 10, 50, 500]
