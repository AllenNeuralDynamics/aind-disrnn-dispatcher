## Beaker spec — disRNN on one H200 (same config as the T4/L40s benchmark),
## for the T4 vs L40s vs H200 run-time / util / power comparison.
## The launcher renders <SWEEP_ID> at submit.
##
## Launch:
##   python code/launch_beaker.py \
##     --sweep code/beaker/sweep_t4match.yaml \
##     --experiment code/beaker/experiment_h200.yaml

version: v2
description: disRNN T4-match benchmark on one H200
tasks:
  - name: disrnn-h200
    image:
      beaker: han-hou/disrnn-wrapper
    command:
      - bash
      - /workspace/aind-disrnn-wrapper/beaker/entrypoint.sh
      - wandb
      - agent
      - --count
      - "1"
      - "<SWEEP_ID>"
    context:
      priority: normal      # non-preemptible -> holds its slot (Allocated cap)
      preemptible: false
    constraints:
      cluster:
        - ai1/octo-hub-aws-h200
    resources:
      gpuCount: 1
    envVars:
      - name: WANDB_API_KEY
        secret: han-wandb-api-key
      - name: DISRNN_OUTPUT_DIR
        value: /results
      - name: WRAPPER_REF
        value: ai_hub
      - name: DISPATCHER_REF
        value: ai_hub
    result:
      path: /results
