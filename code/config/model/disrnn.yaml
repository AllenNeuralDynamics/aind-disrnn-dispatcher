# disRNN model config. Values mirror the wrapper pck_dev source of truth
# (aind-disrnn-wrapper@a790cc0 code/configs/config_disrnn.yaml, "disrnn, multi-subject").
# Conventions: https://github.com/AllenNeuralDynamics/aind_disrnn_utils/blob/main/src/aind_disrnn_utils/data_models.py
type: disrnn

_target_: model_trainers.disrnn_trainer.DisrnnTrainer

architecture:
  multisubject: true
  latent_size: 5
  update_net_n_units_per_layer: 16
  update_net_n_layers: 5
  choice_net_n_units_per_layer: 4
  choice_net_n_layers: 0
  activation: leaky_relu
  subject_embedding_size: 4
  subject_embedding_init: zeros   # zeros | small_random | subject_count_scaled_random
  use_global_subject_bottleneck: true
  session_encoding_type: none      # none | scalar | fourier
  session_integration_type: direct # direct | pre_mlp
  session_fourier_k: 4             # used only for fourier
  session_delta_n_layers: 3
  session_delta_hidden_size: 16
  session_n_pretrain_steps: null   # null => resolve to ~30% of warmup + train steps
  session_n_warmup_steps: null     # null => resolve to ~20% of warmup + train steps

penalties:
  beta: 0.001
  latent_penalty: ${.beta}
  choice_net_latent_penalty: ${.beta}
  update_net_obs_penalty: ${.beta}
  update_net_latent_penalty_multiplier: 1.0
  update_net_latent_penalty: ${.beta}
  # The subject pathway has THREE bottlenecks (the global subject bottleneck, and the
  # subject channels into the update net and the choice net). They are coupled to
  # `subject_penalty` rather than to `beta` directly, so overriding `subject_penalty`
  # relaxes the whole subject pathway with one knob. Pinning the downstream two to
  # `beta` instead would leave them clamped when `subject_penalty` is swept, so the
  # subject embedding would stay bottlenecked downstream and a capacity experiment
  # would silently return a false negative. Default is unchanged (`subject_penalty`
  # resolves to `beta`), so this is backward-compatible with studies 01-05.
  subject_penalty: ${.beta}
  update_net_subject_penalty: ${.subject_penalty}
  choice_net_subject_penalty: ${.subject_penalty}

distillation:
  enabled: false
  teacher_model_dirs: []
  temperature: 2.0
  aggregation: mean_probs
  loss: kl
  use_hard_labels: false
  evaluate_against_hard_labels: true
  save_manifest: true

training:
  n_steps: 20
  n_warmup_steps: 10
  lr: 0.001
  loss: penalized_categorical
  loss_param: 1.0
  max_grad_norm: 1.0
  lambda_reg_session: 0.0   # 0 disables zero-mean session-delta regularization; try 1.0
  # Length-bucketed batching (opt-in): trim each random-mode training batch's unroll
  # from the global T_max to the batch's own session length, cutting padding compute.
  # Requires data.batch_mode=random. Wired in disrnn_trainer.py (mirrors gru_scaling).
  length_bucketing: false
  length_bucket_grid: 128   # round session lengths up to this multiple for bucketing
  # Extend-later: set to a prior run's W&B id to CONTINUE from its checkpoint (staged
  # horizons). run_hpc downloads that run's training-output artifact before training so
  # the trainer resumes from it and skips warmup. null => normal fresh run. See wrapper
  # beaker/README.md section 3b. (env DISRNN_RESTORE_FROM_RUN_ID overrides this.)
  restore_from_run_id: null
  checkpoint_every_n_steps: 10
  checkpoint_eval_on_eval_split: true
  checkpoint_eval_on_train_split: true
  checkpoint_log_eval_to_wandb: true
  checkpoint_log_train_to_wandb: true
  checkpoint_plot_split_examples_every_n: 10
  checkpoint_save_output_df_every_n: 0
  checkpoint_log_split_examples_to_wandb: true
  checkpoint_keep_media_files: false
  checkpoint_plot_choice_rule: false
  checkpoint_plot_update_rules: false
  checkpoint_run_heldout_eval: true
  checkpoint_include_final_in_heldout: true
  initialization_eval_before_warmup: true
  initialization_eval_after_warmup: true
  plot_choice_rule: true    # end-of-run choice-rule figure (fig/choice_rule)
  plot_update_rules: true   # end-of-run update-rule figures (fig/update_rule_*)
  plot_subject_index: 0   # which subject's embedding is used for rule plots
  session_conditioning_verbose_logging: true
  plot_session_context_state_space: true
  session_context_plot_max_subjects: 3
  session_context_plot_subject_indices: null
  save_output_df: false
  auto_heldout_finetune:    # auto-run held-out-subject finetuning after training
    enabled: true
    checkpoint_policy: final
    n_steps: 50
    lr: 0.01
    checkpoint_every_n_steps: 10
    checkpoint_plot_split_examples_every_n: 10
    checkpoint_save_output_df_every_n: 0
    batch_size: null
    batch_mode: single
    keep_media_files: true
    train_example_sessions_per_subject: 1
    eval_example_sessions_per_subject: 1
    example_max_subjects: 6
    output_root: /results/heldout_subject_finetuning
    run_name_suffix: null

seed: ${seed}  # Seed for model trainer

output_dir: ${oc.env:DISRNN_OUTPUT_DIR,/results}  # will be overridden with wandb run folder

# Your template for the model part of the run name
run_name_component: disrnn_beta${.penalties.beta}_lr${.training.lr}
